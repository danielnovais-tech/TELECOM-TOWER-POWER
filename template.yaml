AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Telecom Tower Power – serverless deployment via
  AWS Lambda + API Gateway (HTTP API).

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.12
    Architectures:
      - x86_64

Parameters:
  DatabaseUrl:
    Type: String
    Description: PostgreSQL connection string (postgresql+asyncpg://...)
    NoEcho: true
  RedisUrl:
    Type: String
    Description: Redis connection string
    Default: ""
    NoEcho: true
  ValidApiKeys:
    Type: String
    Description: JSON map of API keys to tiers
    Default: ""
    NoEcho: true
  EnableDemoKeys:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
  CorsOrigins:
    Type: String
    Default: "*"
    Description: Comma-separated CORS allowed origins
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
  # ---- RDS Proxy / VPC parameters ----
  RdsProxyHost:
    Type: String
    Description: RDS Proxy endpoint hostname (enables IAM auth + connection pooling)
    Default: ""
  RdsProxyPort:
    Type: String
    Description: RDS Proxy port
    Default: "5432"
  DbName:
    Type: String
    Description: Database name on RDS
    Default: "telecom_tower_power"
  DbUser:
    Type: String
    Description: Database user for RDS Proxy IAM auth
    Default: "telecom_admin"
  VpcSubnetIds:
    Type: CommaDelimitedList
    Description: VPC subnet IDs for Lambda (required when using RDS Proxy)
    Default: ""
  LambdaSecurityGroupId:
    Type: String
    Description: Security group ID for Lambda to reach RDS Proxy
    Default: ""
  BatchWorkerConcurrency:
    Type: Number
    Description: Max concurrent Lambda batch workers (limits DB connections)
    Default: 5
    MinValue: 1
    MaxValue: 50
  # ---- RDS Proxy provisioning (optional) ----
  # When all three of RdsInstanceIdentifier, DbMasterSecretArn, and
  # RdsProxySecurityGroupId are set, this stack will create an RDS Proxy
  # in front of the RDS instance and Lambdas will connect through it
  # using IAM auth (no DB password in env). Leave empty to skip.
  RdsInstanceIdentifier:
    Type: String
    Description: Existing RDS DB instance identifier to put behind RDS Proxy (empty = skip provisioning)
    Default: ""
  DbMasterSecretArn:
    Type: String
    Description: Secrets Manager ARN holding RDS master credentials (required when RdsInstanceIdentifier is set)
    Default: ""
  RdsProxySecurityGroupId:
    Type: String
    Description: Security group ID for the RDS Proxy ENIs (must allow 5432 from Lambda SG and to RDS)
    Default: ""
  RdsProxyMaxConnectionsPercent:
    Type: Number
    Description: Max % of RDS max_connections the proxy may use
    Default: 80
    MinValue: 10
    MaxValue: 100
  RdsProxyIdleClientTimeout:
    Type: Number
    Description: Idle client connection timeout (seconds) for RDS Proxy
    Default: 1800
    MinValue: 60
    MaxValue: 28800

Conditions:
  HasRdsProxy: !Not [!Equals [!Ref RdsProxyHost, ""]]
  HasVpcConfig: !And
    - !Not [!Equals [!Ref LambdaSecurityGroupId, ""]]
    - !Not [!Equals [!Select [0, !Ref VpcSubnetIds], ""]]
  CreateRdsProxy: !And
    - !Not [!Equals [!Ref RdsInstanceIdentifier, ""]]
    - !Not [!Equals [!Ref DbMasterSecretArn, ""]]
    - !Not [!Equals [!Ref RdsProxySecurityGroupId, ""]]
    - !Not [!Equals [!Select [0, !Ref VpcSubnetIds], ""]]
  UseProxyEnv: !Or
    - !Condition HasRdsProxy
    - !Condition CreateRdsProxy

Resources:
  # ---- Lambda Function (API) ----
  TelecomTowerPowerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: lambda_handler.handler
      CodeUri: .
      Description: Telecom Tower Power FastAPI application
      VpcConfig:
        !If
          - HasVpcConfig
          - SecurityGroupIds: [!Ref LambdaSecurityGroupId]
            SubnetIds: !Ref VpcSubnetIds
          - !Ref "AWS::NoValue"
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          REDIS_URL: !Ref RedisUrl
          VALID_API_KEYS: !Ref ValidApiKeys
          ENABLE_DEMO_KEYS: !Ref EnableDemoKeys
          CORS_ORIGINS: !Ref CorsOrigins
          SRTM_DATA_DIR: /tmp/srtm_data
          S3_BUCKET_NAME: !Ref ReportsBucket
          SQS_QUEUE_URL: !Ref BatchJobQueue
          RDS_PROXY_HOST: !If
            - CreateRdsProxy
            - !GetAtt RdsProxy.Endpoint
            - !Ref RdsProxyHost
          RDS_PROXY_PORT: !Ref RdsProxyPort
          DB_NAME: !Ref DbName
          DB_USER: !Ref DbUser
          # ML coverage prediction
          BEDROCK_REGION: !Ref AWS::Region
          BEDROCK_MODEL_ID: amazon.nova-micro-v1:0
          SAGEMAKER_REGION: !Ref AWS::Region
          COVERAGE_MODEL_PATH: /var/task/coverage_model.npz
      Policies:
        - AWSLambdaBasicExecutionRole
        - !If
          - HasVpcConfig
          - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
          - !Ref "AWS::NoValue"
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub "arn:aws:s3:::${ReportsBucket}/*"
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt BatchJobQueue.Arn
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
            - Effect: Allow
              Action:
                - sagemaker:InvokeEndpoint
              Resource: "*"
        - !If
          - UseProxyEnv
          - Statement:
              - Effect: Allow
                Action: rds-db:connect
                Resource: !Sub "arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:*/${DbUser}"
          - !Ref "AWS::NoValue"
      Events:
        ApiCatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY

  # ---- Lambda Function (SQS Batch Worker) ----
  BatchWorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: sqs_lambda_worker.handler
      CodeUri: .
      Description: >
        SQS-triggered Lambda that processes batch PDF generation jobs.
        Reads job from DB, generates PDFs, uploads ZIP to S3.
        Uses RDS Proxy with IAM auth when RDS_PROXY_HOST is set.
      MemorySize: 1024
      Timeout: 900
      VpcConfig:
        !If
          - HasVpcConfig
          - SecurityGroupIds: [!Ref LambdaSecurityGroupId]
            SubnetIds: !Ref VpcSubnetIds
          - !Ref "AWS::NoValue"
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          S3_BUCKET_NAME: !Ref ReportsBucket
          S3_PREFIX: "batch-results/"
          SRTM_DATA_DIR: /tmp/srtm_data
          RDS_PROXY_HOST: !If
            - CreateRdsProxy
            - !GetAtt RdsProxy.Endpoint
            - !Ref RdsProxyHost
          RDS_PROXY_PORT: !Ref RdsProxyPort
          DB_NAME: !Ref DbName
          DB_USER: !Ref DbUser
      Policies:
        - AWSLambdaBasicExecutionRole
        - !If
          - HasVpcConfig
          - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
          - !Ref "AWS::NoValue"
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub "arn:aws:s3:::${ReportsBucket}/*"
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt BatchJobQueue.Arn
        - !If
          - UseProxyEnv
          - Statement:
              - Effect: Allow
                Action: rds-db:connect
                Resource: !Sub "arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:*/${DbUser}"
          - !Ref "AWS::NoValue"
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt BatchJobQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures

  # ---- SQS Queue (Batch Jobs) ----
  BatchJobQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "telecom-batch-jobs-${Stage}"
      VisibilityTimeout: 960
      MessageRetentionPeriod: 1209600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt BatchJobDLQ.Arn
        maxReceiveCount: 3

  # ---- SQS Dead Letter Queue ----
  BatchJobDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "telecom-batch-jobs-dlq-${Stage}"
      MessageRetentionPeriod: 1209600

  # ---- HTTP API (API Gateway v2) ----
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - X-API-Key
          - Authorization
        MaxAge: 3600

  # ---- S3 Bucket for reports / batch results ----
  ReportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "telecom-tower-power-reports-${AWS::AccountId}-${Stage}"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireProReports
            Status: Enabled
            Prefix: "batch-results/pro/"
            ExpirationInDays: 30
          - Id: ExpireFreeReports
            Status: Enabled
            Prefix: "batch-results/free/"
            ExpirationInDays: 30
          - Id: ExpireEnterpriseReports
            Status: Enabled
            Prefix: "batch-results/enterprise/"
            ExpirationInDays: 365

  # ---- RDS Proxy (optional, gated by CreateRdsProxy condition) ----
  # Provides connection pooling + IAM auth for Lambdas connecting to RDS.
  # Avoids exhausting Postgres max_connections under burst load and
  # eliminates the need to ship DB passwords in Lambda env vars.
  RdsProxyRole:
    Type: AWS::IAM::Role
    Condition: CreateRdsProxy
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: rds.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReadDbSecret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Ref DbMasterSecretArn

  RdsProxy:
    Type: AWS::RDS::DBProxy
    Condition: CreateRdsProxy
    Properties:
      DBProxyName: !Sub "telecom-tower-power-${Stage}"
      EngineFamily: POSTGRESQL
      RoleArn: !GetAtt RdsProxyRole.Arn
      Auth:
        - AuthScheme: SECRETS
          IAMAuth: REQUIRED
          SecretArn: !Ref DbMasterSecretArn
      VpcSubnetIds: !Ref VpcSubnetIds
      VpcSecurityGroupIds:
        - !Ref RdsProxySecurityGroupId
      RequireTLS: true
      IdleClientTimeout: !Ref RdsProxyIdleClientTimeout
      DebugLogging: false

  RdsProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Condition: CreateRdsProxy
    Properties:
      DBProxyName: !Ref RdsProxy
      TargetGroupName: default
      DBInstanceIdentifiers:
        - !Ref RdsInstanceIdentifier
      ConnectionPoolConfigurationInfo:
        MaxConnectionsPercent: !Ref RdsProxyMaxConnectionsPercent
        MaxIdleConnectionsPercent: 50
        ConnectionBorrowTimeout: 120

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt TelecomTowerPowerFunction.Arn
  BatchWorkerFunctionArn:
    Description: Batch worker Lambda function ARN
    Value: !GetAtt BatchWorkerFunction.Arn
  BatchJobQueueUrl:
    Description: SQS queue URL for batch jobs
    Value: !Ref BatchJobQueue
  BatchJobQueueArn:
    Description: SQS queue ARN for batch jobs
    Value: !GetAtt BatchJobQueue.Arn
  BatchJobDLQUrl:
    Description: Dead letter queue URL for failed batch jobs
    Value: !Ref BatchJobDLQ
  ReportsBucketName:
    Description: S3 bucket for generated reports
    Value: !Ref ReportsBucket
  RdsProxyEndpoint:
    Condition: HasRdsProxy
    Description: RDS Proxy endpoint for database connections
    Value: !Ref RdsProxyHost
  CreatedRdsProxyEndpoint:
    Condition: CreateRdsProxy
    Description: RDS Proxy endpoint provisioned by this stack
    Value: !GetAtt RdsProxy.Endpoint
  CreatedRdsProxyArn:
    Condition: CreateRdsProxy
    Description: ARN of the RDS Proxy provisioned by this stack
    Value: !GetAtt RdsProxy.DBProxyArn
