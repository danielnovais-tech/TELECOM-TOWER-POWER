[phases.setup]
aptPkgs = ["wget"]

[phases.install]
cmds = [
  "wget -qO /tmp/redis_exporter.tar.gz https://github.com/oliver006/redis_exporter/releases/download/v1.67.0/redis_exporter-v1.67.0.linux-amd64.tar.gz",
  "tar xzf /tmp/redis_exporter.tar.gz -C /tmp",
  "mv /tmp/redis_exporter-v1.67.0.linux-amd64/redis_exporter /usr/local/bin/redis_exporter",
  "chmod +x /usr/local/bin/redis_exporter",
  "rm -rf /tmp/redis_exporter*"
]

[start]
cmd = "redis_exporter --web.listen-address=:${PORT:-9121}"
