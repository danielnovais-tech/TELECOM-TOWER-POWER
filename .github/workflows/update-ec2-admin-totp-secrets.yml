name: Update EC2 Admin TOTP Secrets

# Push the ADMIN_TOTP_SECRETS secret to the EC2 host via SSM and restart
# the API container so load_secrets.sh exports the new value. Manual
# trigger only — rotating an admin's TOTP seed locks them out of
# /admin/impersonate/* and /admin/sales/tenants/* until they re-enrol
# the new seed in their authenticator app.
#
# Required GitHub Actions secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  — creds with SSM:SendCommand on the instance
#   EC2_INSTANCE_ID                           — e.g. i-0123456789abcdef0
#   ADMIN_TOTP_SECRETS                        — comma-separated email:base32secret pairs
#
# Format reminder:
#   ops@example.com:JBSWY3DPEHPK3PXP,sre@example.com:KRSXG5DJN5XGI...
# Generate one base32 seed per admin via:
#   python3 -c "import base64,os;print(base64.b32encode(os.urandom(20)).decode().rstrip('='))"

on:
  workflow_dispatch:
    inputs:
      acknowledge_rotation:
        description: 'Type ROTATE to confirm. Leaving blank pushes only if no TOTP secrets file exists yet.'
        required: false
        default: ''

concurrency:
  group: update-ec2-admin-totp-secrets
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-admin-totp:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Validate required GitHub secrets
        env:
          ADMIN_TOTP_SECRETS: ${{ secrets.ADMIN_TOTP_SECRETS }}
        run: |
          set -euo pipefail
          if [ -z "${ADMIN_TOTP_SECRETS:-}" ]; then
            echo "::error::Missing GitHub Actions secret: ADMIN_TOTP_SECRETS"
            exit 1
          fi
          # Sanity: each entry must be email:base32 with base32 ≥16 chars
          # (16 base32 chars = 80 bits = entropy floor for TOTP seeds).
          OLD_IFS=$IFS
          IFS=','
          set -- $ADMIN_TOTP_SECRETS
          IFS=$OLD_IFS
          n=0
          for entry in "$@"; do
            n=$((n+1))
            if ! printf '%s' "$entry" | grep -qE '^[^:]+:[A-Za-z2-7]{16,}$'; then
              echo "::error::Entry #$n malformed (expected email:base32, ≥16 base32 chars)"
              exit 1
            fi
          done
          echo "Validated $n admin TOTP entr$([ $n -eq 1 ] && echo y || echo ies)."

      - name: Verify EC2 is managed by SSM
        run: |
          set -euo pipefail
          PING_STATUS=$(aws ssm describe-instance-information \
            --region sa-east-1 \
            --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text 2>/dev/null || true)

          echo "SSM PingStatus: ${PING_STATUS}"

          if [ -z "$PING_STATUS" ] || [ "$PING_STATUS" = "None" ] || [ "$PING_STATUS" = "null" ]; then
            echo "::error::Instance not found in SSM."
            exit 1
          fi

          if [ "$PING_STATUS" != "Online" ]; then
            echo "::error::EC2 instance is not Online in SSM. Current status: ${PING_STATUS}"
            exit 1
          fi

      - name: Write admin TOTP secrets on EC2 via SSM
        env:
          ADMIN_TOTP_SECRETS: ${{ secrets.ADMIN_TOTP_SECRETS }}
          ACK: ${{ github.event.inputs.acknowledge_rotation }}
        run: |
          set -euo pipefail
          SECRETS_B64=$(printf '%s' "$ADMIN_TOTP_SECRETS" | base64 -w 0)
          ACK_B64=$(printf '%s' "$ACK" | base64 -w 0)

          cat > /tmp/admin-totp-ssm-commands.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "if [ -d /home/ubuntu/TELECOM-TOWER-POWER ]; then REPO_DIR=/home/ubuntu/TELECOM-TOWER-POWER; elif [ -d /home/ec2-user/TELECOM-TOWER-POWER ]; then REPO_DIR=/home/ec2-user/TELECOM-TOWER-POWER; else echo 'Repo directory not found'; exit 1; fi",
              "cd \$REPO_DIR",
              "mkdir -p secrets",
              "umask 077",
              "ACK=\$(printf '%s' '${ACK_B64}' | base64 -d)",
              "if [ -s secrets/admin_totp_secrets ] && [ \"\$ACK\" != 'ROTATE' ]; then",
              "  echo 'admin_totp_secrets already present; refusing to overwrite without ROTATE confirmation.'",
              "  echo 'Re-run this workflow with acknowledge_rotation=ROTATE to rotate.'",
              "  exit 2",
              "fi",
              "printf '%s' '${SECRETS_B64}' | base64 -d > secrets/admin_totp_secrets",
              "chmod 600 secrets/admin_totp_secrets",
              "chown 1000:1000 secrets/admin_totp_secrets 2>/dev/null || true",
              "[ -s secrets/admin_totp_secrets ] || { echo 'admin_totp_secrets empty after write'; exit 1; }",
              "ENTRY_COUNT=\$(tr ',' '\\n' < secrets/admin_totp_secrets | grep -c ':' || true)",
              "echo \"admin_totp_secrets written (\$ENTRY_COUNT entries).\"",
              "docker compose up -d --no-deps --force-recreate api",
              "i=0; while [ \$i -lt 60 ]; do i=\$((i+1)); if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then echo 'API healthy'; break; fi; sleep 2; done",
              "curl -fsS http://localhost:8000/health >/dev/null",
              "echo 'Admin TOTP secrets updated; API restarted successfully.'"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --region sa-east-1 \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Update ADMIN_TOTP_SECRETS secret" \
            --parameters file:///tmp/admin-totp-ssm-commands.json \
            --query 'Command.CommandId' \
            --output text)

          for _ in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --region sa-east-1 \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' \
              --output text)

            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --region sa-east-1 \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query 'StandardOutputContent' \
                  --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                aws ssm get-command-invocation \
                  --region sa-east-1 \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query '{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' \
                  --output json
                exit 1
                ;;
            esac

            sleep 5
          done

          echo "::error::Timed out waiting for SSM command ${COMMAND_ID}"
          aws ssm get-command-invocation \
            --region sa-east-1 \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query '{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' \
            --output json || true
          exit 1
