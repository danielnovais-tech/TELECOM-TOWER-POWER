name: Nightly Grafana Volume Backup

on:
  schedule:
    - cron: '45 5 * * *'  # 5:45 AM UTC (2:45 AM BRT) — 15min after railway-pg backup
  workflow_dispatch:

concurrency:
  group: grafana-backup
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Whitelist runner IP in EC2 SG
        id: sg
        env:
          EC2_SG_ID: ${{ secrets.EC2_SG_ID }}
        run: |
          : "${EC2_SG_ID:?EC2_SG_ID secret not set}"
          RUNNER_IP=$(curl -sSf https://checkip.amazonaws.com | tr -d '\r\n')
          echo "Runner IP: ${RUNNER_IP}"
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id "${EC2_SG_ID}" \
            --protocol tcp --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --tag-specifications "ResourceType=security-group-rule,Tags=[{Key=Name,Value=gh-actions-ephemeral},{Key=Workflow,Value=backup-grafana-volume}]" \
            2>&1 | grep -v "InvalidPermission.Duplicate" || true

      - name: Push SSH key via EC2 Instance Connect
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/ec2_key -N "" -q
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --instance-os-user ubuntu \
            --ssh-public-key file:///tmp/ec2_key.pub

      - name: Create Grafana volume tarball on EC2
        id: tar
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H%M)
          REMOTE_TAR="/tmp/grafana-data-${TIMESTAMP}.tar.gz"
          echo "TIMESTAMP=$TIMESTAMP" >> "$GITHUB_ENV"
          echo "REMOTE_TAR=$REMOTE_TAR"   >> "$GITHUB_ENV"

          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            "TS='${TIMESTAMP}' REMOTE_TAR='${REMOTE_TAR}' bash -s" << 'REMOTE'
          set -euo pipefail
          cd /home/ubuntu/TELECOM-TOWER-POWER

          # Resolve the actual Docker volume name (compose prefixes with project name).
          # Volume is declared as `grafana_data` in docker-compose.yml, so the full
          # name is something like `telecom-tower-power_grafana_data`. `|| true`
          # keeps `set -e` from killing the script on grep-no-match so we can
          # actually print the helpful error below.
          VOL=$(docker volume ls --format '{{.Name}}' | grep -E '(^|_)grafana[_-]data$' | head -1 || true)
          if [ -z "$VOL" ]; then
            echo "ERROR: grafana_data volume not found"
            docker volume ls
            exit 1
          fi
          echo "Backing up volume: $VOL"

          # Tarball via throwaway alpine container (read-only mount of the volume).
          docker run --rm \
            -v "${VOL}":/data:ro \
            -v /tmp:/backup \
            alpine:3 \
            sh -c "tar czf /backup/$(basename ${REMOTE_TAR}) -C /data ."

          ls -lh "${REMOTE_TAR}"
          REMOTE

      - name: Download tarball to runner
        run: |
          scp -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            "ubuntu@${{ secrets.EC2_HOST }}:${REMOTE_TAR}" \
            "/tmp/$(basename ${REMOTE_TAR})"
          LOCAL_TAR="/tmp/$(basename ${REMOTE_TAR})"
          DUMP_KB=$(( $(stat -c%s "${LOCAL_TAR}") / 1024 ))
          echo "LOCAL_TAR=${LOCAL_TAR}" >> "$GITHUB_ENV"
          echo "DUMP_KB=${DUMP_KB}"     >> "$GITHUB_ENV"
          echo "Downloaded ${LOCAL_TAR} (${DUMP_KB} KB)"

      - name: Upload to S3
        run: |
          S3_KEY="backups/grafana/grafana-data_${TIMESTAMP}.tar.gz"
          aws s3 cp "${LOCAL_TAR}" "s3://telecom-tower-power-results/${S3_KEY}"
          echo "Uploaded s3://telecom-tower-power-results/${S3_KEY}"
          echo "S3_KEY=${S3_KEY}" >> "$GITHUB_ENV"

      - name: Prune backups older than 14 days
        run: |
          # pipefail so a failing `aws s3 ls` (creds/5xx/etc.) is not masked by
          # the `while read` consumer silently succeeding on empty input.
          set -euo pipefail
          CUTOFF=$(date -d "-14 days" +%Y-%m-%d)
          echo "Pruning backups older than $CUTOFF..."
          LISTING=$(aws s3 ls s3://telecom-tower-power-results/backups/grafana/)
          while read -r line; do
            FILE_DATE=$(echo "$line" | awk '{print $1}')
            FILE_NAME=$(echo "$line" | awk '{print $4}')
            if [[ -n "$FILE_NAME" && "$FILE_DATE" < "$CUTOFF" ]]; then
              echo "  Deleting $FILE_NAME (from $FILE_DATE)"
              aws s3 rm "s3://telecom-tower-power-results/backups/grafana/${FILE_NAME}"
            fi
          done <<< "$LISTING"

      - name: Cleanup remote tarball
        if: always()
        run: |
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            "rm -f ${REMOTE_TAR}" 2>/dev/null || true

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            EMOJI=":white_check_mark:"
            MSG="Grafana backup OK — s3://telecom-tower-power-results/${S3_KEY} (${DUMP_KB} KB)"
          else
            EMOJI=":x:"
            MSG="Grafana backup FAILED — check https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          if [[ -n "${SLACK_WEBHOOK_URL:-}" ]]; then
            curl -sf -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"${EMOJI} *grafana-backup*: ${MSG}\"}" || true
          fi

      - name: Revoke runner IP from EC2 SG
        if: always() && steps.sg.outputs.runner_ip != ''
        env:
          EC2_SG_ID: ${{ secrets.EC2_SG_ID }}
          RUNNER_IP: ${{ steps.sg.outputs.runner_ip }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${EC2_SG_ID}" \
            --protocol tcp --port 22 \
            --cidr "${RUNNER_IP}/32" \
            2>&1 | grep -v "InvalidPermission.NotFound" || true

      - name: Cleanup local tarball
        if: always()
        run: rm -f /tmp/grafana-data-*.tar.gz /tmp/ec2_key /tmp/ec2_key.pub
