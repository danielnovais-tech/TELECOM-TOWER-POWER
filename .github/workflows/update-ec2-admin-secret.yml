name: Update EC2 Admin Secret

# Push the ADMIN_API_KEYS secret (comma-separated admin keys for the
# /admin/sales/* endpoints) to the EC2 host via SSM and restart the API
# container so load_secrets.sh exports the new value. Manual trigger only.
#
# Required GitHub Actions secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  — creds with SSM:SendCommand on the instance
#   EC2_INSTANCE_ID                           — e.g. i-0123456789abcdef0
#   ADMIN_API_KEYS                            — comma-separated admin API keys

on:
  workflow_dispatch:

concurrency:
  group: update-ec2-admin-secret
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-admin-secret:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Validate required GitHub secrets
        env:
          ADMIN_API_KEYS: ${{ secrets.ADMIN_API_KEYS }}
        run: |
          set -euo pipefail
          if [ -z "${ADMIN_API_KEYS:-}" ]; then
            echo "::error::Missing GitHub Actions secret: ADMIN_API_KEYS"
            exit 1
          fi
          # Sanity: at least 16 chars per key, comma-separated.
          IFS=',' read -ra _keys <<< "$ADMIN_API_KEYS"
          for k in "${_keys[@]}"; do
            if [ ${#k} -lt 16 ]; then
              echo "::error::Each admin key must be ≥16 chars; got one of length ${#k}."
              exit 1
            fi
          done
          echo "Validated ${#_keys[@]} admin key(s)."

      - name: Verify EC2 is managed by SSM
        run: |
          set -euo pipefail
          PING_STATUS=$(aws ssm describe-instance-information \
            --region sa-east-1 \
            --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text 2>/dev/null || true)

          echo "SSM PingStatus: ${PING_STATUS}"

          if [ -z "$PING_STATUS" ] || [ "$PING_STATUS" = "None" ] || [ "$PING_STATUS" = "null" ]; then
            echo "::error::Instance not found in SSM."
            exit 1
          fi

          if [ "$PING_STATUS" != "Online" ]; then
            echo "::error::EC2 instance is not Online in SSM. Current status: ${PING_STATUS}"
            exit 1
          fi

      - name: Write admin secret on EC2 via SSM
        env:
          ADMIN_API_KEYS: ${{ secrets.ADMIN_API_KEYS }}
        run: |
          ADMIN_API_KEYS_B64=$(printf '%s' "$ADMIN_API_KEYS" | base64 -w 0)

          cat > /tmp/admin-ssm-commands.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "if [ -d /home/ubuntu/TELECOM-TOWER-POWER ]; then REPO_DIR=/home/ubuntu/TELECOM-TOWER-POWER; elif [ -d /home/ec2-user/TELECOM-TOWER-POWER ]; then REPO_DIR=/home/ec2-user/TELECOM-TOWER-POWER; else echo 'Repo directory not found'; exit 1; fi",
              "cd \$REPO_DIR",
              "mkdir -p secrets",
              "umask 077",
              "printf '%s' '${ADMIN_API_KEYS_B64}' | base64 -d > secrets/admin_api_keys",
              "chmod 600 secrets/admin_api_keys",
              "[ -s secrets/admin_api_keys ] || { echo 'admin_api_keys empty after write'; exit 1; }",
              "docker compose up -d --no-deps --force-recreate api",
              "i=0; while [ \$i -lt 60 ]; do i=\$((i+1)); if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then echo 'API healthy'; break; fi; sleep 2; done",
              "curl -fsS http://localhost:8000/health >/dev/null",
              "FIRST_KEY=\$(head -c 200 secrets/admin_api_keys | cut -d, -f1)",
              "STATUS=\$(curl -s -o /dev/null -w '%{http_code}' -H \"X-API-Key: \$FIRST_KEY\" http://localhost:8000/admin/sales/overview)",
              "if [ \"\$STATUS\" = \"200\" ]; then echo 'admin endpoint reachable (HTTP 200)'; else echo \"WARN: admin endpoint returned HTTP \$STATUS (expected 200)\"; exit 1; fi",
              "echo 'Admin secret updated; API restarted successfully'"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --region sa-east-1 \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Update ADMIN_API_KEYS secret" \
            --parameters file:///tmp/admin-ssm-commands.json \
            --query 'Command.CommandId' \
            --output text)

          for _ in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --region sa-east-1 \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' \
              --output text)

            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --region sa-east-1 \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query 'StandardOutputContent' \
                  --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                aws ssm get-command-invocation \
                  --region sa-east-1 \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query '{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' \
                  --output json
                exit 1
                ;;
            esac

            sleep 5
          done

          echo "::error::Timed out waiting for SSM command ${COMMAND_ID}"
          aws ssm get-command-invocation \
            --region sa-east-1 \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query '{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' \
            --output json || true
          exit 1
