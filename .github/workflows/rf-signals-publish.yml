name: rf-signals publish

# Builds the clean-room rfsignals-cli binary on every push to main that
# touches rf_signals/ or its build script, and uploads the artefact to
# s3://telecom-tower-power-results/bin/ as a public-read object so the
# API container can fetch it via plain HTTPS at boot (no AWS creds in
# the runtime image).
#
# Two keys are published per build:
#   * bin/rfsignals-cli                     (mutable "current", 5-min cache)
#   * bin/rfsignals-cli-<sha256-12>         (immutable, 1-year cache)
#
# Rollback: point RF_SIGNALS_S3_URL at a SHA-tagged sibling.

on:
  push:
    branches: [main]
    paths:
      - "rf_signals/**"
      - "scripts/build_rf_signals.sh"
      - ".github/workflows/rf-signals-publish.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: sa-east-1
  S3_PUBLISH_URI: s3://telecom-tower-power-results/bin/rfsignals-cli

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          if ! command -v cargo >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends rustc cargo
          fi
          rustc --version
          cargo --version

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build + publish rfsignals-cli
        env:
          PREFIX: ${{ runner.temp }}/rfsignals
          S3_PUBLISH_URI: ${{ env.S3_PUBLISH_URI }}
        run: |
          set -euo pipefail
          mkdir -p "$PREFIX/bin"
          bash scripts/build_rf_signals.sh
          ls -la "$PREFIX/bin/rfsignals-cli"

      - name: Smoke test (head-object on published key)
        run: |
          set -euo pipefail
          # Bucket is private (BucketOwnerEnforced); verify via authenticated API.
          aws s3api head-object \
            --bucket telecom-tower-power-results \
            --key bin/rfsignals-cli \
            --region "$AWS_REGION"
          echo "object present (head-object ok)"
