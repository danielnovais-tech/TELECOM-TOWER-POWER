name: Deploy MkDocs to EC2

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: docs-site/requirements.txt

      - name: Install MkDocs dependencies
        working-directory: docs-site
        run: pip install -r requirements.txt

      - name: Build docs site
        working-directory: docs-site
        run: mkdocs build --strict

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Whitelist runner IP in EC2 SG
        id: sg
        env:
          EC2_SG_ID: ${{ secrets.EC2_SG_ID }}
        run: |
          : "${EC2_SG_ID:?EC2_SG_ID secret not set}"
          RUNNER_IP=$(curl -sSf https://checkip.amazonaws.com | tr -d '\r\n')
          echo "Runner IP: ${RUNNER_IP}"
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id "${EC2_SG_ID}" \
            --protocol tcp --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --tag-specifications "ResourceType=security-group-rule,Tags=[{Key=Name,Value=gh-actions-ephemeral},{Key=Workflow,Value=deploy-docs}]" \
            2>&1 | grep -v "InvalidPermission.Duplicate" || true

      - name: Push SSH key via EC2 Instance Connect
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/ec2_key -N "" -q
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --instance-os-user ubuntu \
            --ssh-public-key file:///tmp/ec2_key.pub

      - name: Ensure /srv/docs exists on EC2
        run: |
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            'sudo mkdir -p /srv/docs && sudo chown ubuntu:ubuntu /srv/docs'

      - name: Rsync built site to EC2 /srv/docs
        run: |
          rsync -az --delete \
            -e "ssh -i /tmp/ec2_key -o StrictHostKeyChecking=no -o ConnectTimeout=15" \
            docs-site/site/ \
            ubuntu@${{ secrets.EC2_HOST }}:/srv/docs/

      - name: Verify docs host
        continue-on-error: true
        run: |
          sleep 3
          STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" "https://docs.telecomtowerpower.com.br/" || echo "DNS_OR_CONN_FAIL")
          echo "Health check docs.telecomtowerpower.com.br/ returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::docs host returned '$STATUS' — add CNAME docs.telecomtowerpower.com.br → ALB and ensure ALB listener rule forwards this host to the EC2 target group."
          fi

      - name: Revoke runner IP from EC2 SG
        if: always() && steps.sg.outputs.runner_ip != ''
        env:
          EC2_SG_ID: ${{ secrets.EC2_SG_ID }}
          RUNNER_IP: ${{ steps.sg.outputs.runner_ip }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${EC2_SG_ID}" \
            --protocol tcp --port 22 \
            --cidr "${RUNNER_IP}/32" \
            2>&1 || echo "::warning::Could not revoke ${RUNNER_IP}/32 from ${EC2_SG_ID}"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ec2_key /tmp/ec2_key.pub
