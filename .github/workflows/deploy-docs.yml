name: Deploy MkDocs to EC2

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: docs-site/requirements.txt

      - name: Install MkDocs dependencies
        working-directory: docs-site
        run: pip install -r requirements.txt

      - name: Build docs site
        working-directory: docs-site
        run: mkdocs build --strict

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Push SSH key via EC2 Instance Connect
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/ec2_key -N "" -q
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --instance-os-user ubuntu \
            --ssh-public-key file:///tmp/ec2_key.pub

      - name: Ensure /srv/docs exists on EC2
        run: |
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            'sudo mkdir -p /srv/docs && sudo chown ubuntu:ubuntu /srv/docs'

      - name: Rsync built site to EC2 /srv/docs
        run: |
          rsync -az --delete \
            -e "ssh -i /tmp/ec2_key -o StrictHostKeyChecking=no -o ConnectTimeout=15" \
            docs-site/site/ \
            ubuntu@${{ secrets.EC2_HOST }}:/srv/docs/

      - name: Verify docs host
        run: |
          sleep 3
          STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" "https://docs.telecomtowerpower.com.br/")
          echo "Health check docs.telecomtowerpower.com.br/ returned HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::docs host returned HTTP $STATUS — check DNS CNAME and Caddyfile @docs_host matcher"
          fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ec2_key /tmp/ec2_key.pub
