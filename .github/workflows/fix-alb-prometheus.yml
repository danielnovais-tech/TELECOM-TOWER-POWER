name: Fix ALB Prometheus Rule

on:
  push:
    branches: [main]
    paths: [.github/workflows/fix-alb-prometheus.yml]
  workflow_dispatch:

concurrency:
  group: fix-alb-prometheus
  cancel-in-progress: true

jobs:
  fix-alb:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Register EC2 target and fix prometheus routing
        run: |
          set -euo pipefail
          ALB_ARN="arn:aws:elasticloadbalancing:sa-east-1:490083271496:loadbalancer/app/telecom-tower-power-alb/f61f282ff7c0570b"
          PROM_TG_ARN="arn:aws:elasticloadbalancing:sa-east-1:490083271496:targetgroup/ttp-prometheus-tg/df4e704a393dedb8"
          EC2_INSTANCE_ID="i-045166a6a1933f507"

          echo "=== 1. Current targets in prometheus TG ==="
          aws elbv2 describe-target-health --target-group-arn "$PROM_TG_ARN" --output json | jq .

          echo ""
          echo "=== 2. Target group details ==="
          aws elbv2 describe-target-groups --target-group-arns "$PROM_TG_ARN" --output json | jq '.TargetGroups[0] | {Name: .TargetGroupName, Port: .Port, Protocol: .Protocol, TargetType: .TargetType, HealthCheckPath: .HealthCheckPath, VpcId: .VpcId}'

          echo ""
          echo "=== 3. Compare with working grafana TG ==="
          GRAFANA_TG_ARN="arn:aws:elasticloadbalancing:sa-east-1:490083271496:targetgroup/ttp-grafana-tg/32d84c5dac673aec"
          echo "Grafana targets:"
          aws elbv2 describe-target-health --target-group-arn "$GRAFANA_TG_ARN" --output json | jq .
          echo "Grafana TG details:"
          aws elbv2 describe-target-groups --target-group-arns "$GRAFANA_TG_ARN" --output json | jq '.TargetGroups[0] | {Name: .TargetGroupName, Port: .Port, TargetType: .TargetType, VpcId: .VpcId}'

          echo ""
          echo "=== 4. Register EC2 instance in prometheus TG ==="
          aws elbv2 register-targets \
            --target-group-arn "$PROM_TG_ARN" \
            --targets "Id=$EC2_INSTANCE_ID,Port=9090"
          echo "Registered $EC2_INSTANCE_ID:9090 in ttp-prometheus-tg"

          echo ""
          echo "=== 5. Wait for registration then check health ==="
          sleep 10
          aws elbv2 describe-target-health --target-group-arn "$PROM_TG_ARN" --output json | jq .

          echo ""
          echo "Done. EC2 registered in ttp-prometheus-tg. Target should become healthy within 30-60s."
