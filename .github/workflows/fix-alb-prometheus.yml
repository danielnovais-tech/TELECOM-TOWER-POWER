name: Fix ALB Prometheus Rule

on:
  push:
    branches: [main]
    paths: [.github/workflows/fix-alb-prometheus.yml]
  workflow_dispatch:

concurrency:
  group: fix-alb-prometheus
  cancel-in-progress: true

jobs:
  fix-alb:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Inspect and fix prometheus ALB routing
        run: |
          set -euo pipefail
          ALB_ARN="arn:aws:elasticloadbalancing:sa-east-1:490083271496:loadbalancer/app/telecom-tower-power-alb/f61f282ff7c0570b"
          HTTPS_LISTENER_ARN="arn:aws:elasticloadbalancing:sa-east-1:490083271496:listener/app/telecom-tower-power-alb/f61f282ff7c0570b/93b11269b0be1296"
          PROM_TG_ARN="arn:aws:elasticloadbalancing:sa-east-1:490083271496:targetgroup/ttp-prometheus-tg/df4e704a393dedb8"

          echo "=== 1. Current prometheus target group health ==="
          aws elbv2 describe-target-health --target-group-arn "$PROM_TG_ARN" --output json | jq .

          echo ""
          echo "=== 2. Prometheus target group details ==="
          aws elbv2 describe-target-groups --target-group-arns "$PROM_TG_ARN" --output json | jq '.TargetGroups[0] | {Name: .TargetGroupName, Port: .Port, Protocol: .Protocol, HealthCheckPath: .HealthCheckPath, HealthCheckProtocol: .HealthCheckProtocol, HealthCheckPort: .HealthCheckPort}'

          echo ""
          echo "=== 3. Fix: Update health check for Prometheus ==="
          # Prometheus HEAD returns 405, so use GET method and /-/healthy endpoint
          aws elbv2 modify-target-group \
            --target-group-arn "$PROM_TG_ARN" \
            --health-check-path "/-/healthy" \
            --health-check-protocol HTTP \
            --healthy-threshold-count 2 \
            --unhealthy-threshold-count 3 \
            --health-check-interval-seconds 30 \
            --health-check-timeout-seconds 5 \
            --matcher '{"HttpCode":"200"}' \
            --output json | jq '.TargetGroups[0] | {Name: .TargetGroupName, HealthCheckPath: .HealthCheckPath, HealthCheckProtocol: .HealthCheckProtocol}'

          echo ""
          echo "=== 4. Verify updated health check ==="
          aws elbv2 describe-target-groups --target-group-arns "$PROM_TG_ARN" --output json | jq '.TargetGroups[0] | {Name: .TargetGroupName, Port: .Port, HealthCheckPath: .HealthCheckPath, HealthCheckProtocol: .HealthCheckProtocol, Matcher: .Matcher}'

          echo ""
          echo "=== 5. Current target health (may take 30s to update) ==="
          aws elbv2 describe-target-health --target-group-arn "$PROM_TG_ARN" --output json | jq .

          echo ""
          echo "=== 6. All target groups summary ==="
          aws elbv2 describe-target-groups --load-balancer-arn "$ALB_ARN" --query 'TargetGroups[*].[TargetGroupName,Port,HealthCheckPath]' --output table

          echo ""
          echo "Done. Prometheus health check updated to /-/healthy. ALB should mark target healthy within 60s."
