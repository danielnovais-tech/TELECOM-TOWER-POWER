name: Update EC2 Stripe Secrets

on:
  workflow_dispatch:

concurrency:
  group: update-ec2-stripe-secrets
  cancel-in-progress: true

jobs:
  update-stripe-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Validate required GitHub secrets
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
        run: |
          set -euo pipefail
          for name in STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET STRIPE_PRICE_PRO STRIPE_PRICE_ENTERPRISE; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              exit 1
            fi
          done

      - name: Push SSH key via EC2 Instance Connect
        run: |
          set -euo pipefail
          ssh-keygen -t rsa -b 2048 -f /tmp/ec2_key -N "" -q
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --instance-os-user ubuntu \
            --ssh-public-key file:///tmp/ec2_key.pub

      - name: Write Stripe secrets on EC2
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
        run: |
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            "export STRIPE_SECRET_KEY='${STRIPE_SECRET_KEY}' STRIPE_WEBHOOK_SECRET='${STRIPE_WEBHOOK_SECRET}' STRIPE_PRICE_PRO='${STRIPE_PRICE_PRO}' STRIPE_PRICE_ENTERPRISE='${STRIPE_PRICE_ENTERPRISE}' && bash -s" << 'REMOTE'
          set -euo pipefail
          cd /home/ubuntu/TELECOM-TOWER-POWER

          mkdir -p secrets
          umask 077
          printf '%s' "$STRIPE_SECRET_KEY" > secrets/stripe_secret_key
          printf '%s' "$STRIPE_WEBHOOK_SECRET" > secrets/stripe_webhook_secret
          printf '%s' "$STRIPE_PRICE_PRO" > secrets/stripe_price_pro
          printf '%s' "$STRIPE_PRICE_ENTERPRISE" > secrets/stripe_price_enterprise
          chmod 600 \
            secrets/stripe_secret_key \
            secrets/stripe_webhook_secret \
            secrets/stripe_price_pro \
            secrets/stripe_price_enterprise

          for file in stripe_secret_key stripe_webhook_secret stripe_price_pro stripe_price_enterprise; do
            if [ ! -s "secrets/$file" ]; then
              echo "ERROR: secrets/$file is missing or empty"
              exit 1
            fi
          done

          docker compose up -d --no-deps api stripe-webhook
          sleep 5
          curl -fsS http://localhost:8000/health >/dev/null
          curl -fsS http://localhost:8001/health >/dev/null
          echo "Stripe secrets updated and services restarted successfully"
          REMOTE

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ec2_key /tmp/ec2_key.pub