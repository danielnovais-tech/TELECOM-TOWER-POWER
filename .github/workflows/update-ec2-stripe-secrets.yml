name: Update EC2 Stripe Secrets

on:
  workflow_dispatch:

concurrency:
  group: update-ec2-stripe-secrets
  cancel-in-progress: true

jobs:
  update-stripe-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Validate required GitHub secrets
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
        run: |
          set -euo pipefail
          for name in STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET STRIPE_PRICE_PRO STRIPE_PRICE_ENTERPRISE; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              exit 1
            fi
          done

      - name: Verify EC2 is managed by SSM
        run: |
          set -euo pipefail
          PING_STATUS=$(aws ssm describe-instance-information \
            --region sa-east-1 \
            --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text 2>/dev/null || true)

          echo "SSM PingStatus: ${PING_STATUS}"

          if [ -z "$PING_STATUS" ] || [ "$PING_STATUS" = "None" ] || [ "$PING_STATUS" = "null" ]; then
            echo "::error::Instance not found in SSM (not registered). Check EC2_INSTANCE_ID, region sa-east-1, SSM Agent, instance profile (AmazonSSMManagedInstanceCore), and network egress/VPC endpoints."
            exit 1
          fi

          if [ "$PING_STATUS" != "Online" ]; then
            echo "::error::EC2 instance is registered in SSM but not Online. Current status: ${PING_STATUS}"
            exit 1
          fi

      - name: Write Stripe secrets on EC2 via SSM
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
        run: |
          STRIPE_SECRET_KEY_B64=$(printf '%s' "$STRIPE_SECRET_KEY" | base64 -w 0)
          STRIPE_WEBHOOK_SECRET_B64=$(printf '%s' "$STRIPE_WEBHOOK_SECRET" | base64 -w 0)
          STRIPE_PRICE_PRO_B64=$(printf '%s' "$STRIPE_PRICE_PRO" | base64 -w 0)
          STRIPE_PRICE_ENTERPRISE_B64=$(printf '%s' "$STRIPE_PRICE_ENTERPRISE" | base64 -w 0)

          cat > /tmp/stripe-ssm-commands.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "if [ -d /home/ubuntu/TELECOM-TOWER-POWER ]; then REPO_DIR=/home/ubuntu/TELECOM-TOWER-POWER; elif [ -d /home/ec2-user/TELECOM-TOWER-POWER ]; then REPO_DIR=/home/ec2-user/TELECOM-TOWER-POWER; else echo 'Repo directory not found on instance'; ls -la /home || true; exit 1; fi",
              "cd \\$REPO_DIR",
              "mkdir -p secrets",
              "umask 077",
              "printf '%s' '${STRIPE_SECRET_KEY_B64}' | base64 -d > secrets/stripe_secret_key",
              "printf '%s' '${STRIPE_WEBHOOK_SECRET_B64}' | base64 -d > secrets/stripe_webhook_secret",
              "printf '%s' '${STRIPE_PRICE_PRO_B64}' | base64 -d > secrets/stripe_price_pro",
              "printf '%s' '${STRIPE_PRICE_ENTERPRISE_B64}' | base64 -d > secrets/stripe_price_enterprise",
              "chmod 600 secrets/stripe_secret_key secrets/stripe_webhook_secret secrets/stripe_price_pro secrets/stripe_price_enterprise",
              "for file in stripe_secret_key stripe_webhook_secret stripe_price_pro stripe_price_enterprise; do [ -s secrets/\\$file ] || { echo missing:\\$file; exit 1; }; done",
              "docker compose up -d --no-deps api stripe-webhook",
              "sleep 5",
              "curl -fsS http://localhost:8000/health >/dev/null",
              "curl -fsS http://localhost:8001/health >/dev/null",
              "echo Stripe secrets updated and services restarted successfully"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --region sa-east-1 \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Update Stripe secrets" \
            --parameters file:///tmp/stripe-ssm-commands.json \
            --query 'Command.CommandId' \
            --output text)

          for _ in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --region sa-east-1 \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' \
              --output text)

            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --region sa-east-1 \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query 'StandardOutputContent' \
                  --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                aws ssm get-command-invocation \
                  --region sa-east-1 \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query '{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' \
                  --output json
                exit 1
                ;;
            esac

            sleep 5
          done

          echo "::error::Timed out waiting for SSM command ${COMMAND_ID} to finish"
          aws ssm get-command-invocation \
            --region sa-east-1 \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query '{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' \
            --output json || true
          exit 1