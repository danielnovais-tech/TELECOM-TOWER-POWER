name: EC2 Diagnostics

on:
  workflow_dispatch:

concurrency:
  group: ec2-diagnose
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Push SSH key via EC2 Instance Connect
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/ec2_key -N "" -q
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --instance-os-user ubuntu \
            --ssh-public-key file:///tmp/ec2_key.pub

      - name: Run diagnostics on EC2
        run: |
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} << 'DIAG'
          set -x
          echo "========================================"
          echo "  EC2 DIAGNOSTICS — $(date -u)"
          echo "========================================"

          echo ""
          echo "=== 1. System info ==="
          uname -a
          lsb_release -a 2>/dev/null || cat /etc/os-release 2>/dev/null | head -5
          uptime

          echo ""
          echo "=== 2. Disk usage ==="
          df -h / /var/lib/docker 2>/dev/null || df -h /

          echo ""
          echo "=== 3. Memory usage ==="
          free -h

          echo ""
          echo "=== 4. OS packages needing update ==="
          sudo apt-get update -qq 2>&1 | tail -2
          UPGRADABLE=$(apt list --upgradable 2>/dev/null | grep -v "^Listing" | head -30)
          if [ -z "$UPGRADABLE" ]; then
            echo "All packages up to date"
          else
            echo "$UPGRADABLE"
            echo "---"
            echo "$(echo "$UPGRADABLE" | wc -l) packages can be upgraded"
          fi

          echo ""
          echo "=== 5. Docker version ==="
          docker --version
          docker compose version 2>/dev/null || docker-compose --version 2>/dev/null

          echo ""
          echo "=== 6. Docker containers status ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>&1 || sudo docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>&1

          echo ""
          echo "=== 7. Docker images ==="
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}\t{{.CreatedSince}}" 2>&1

          echo ""
          echo "=== 8. Docker disk usage ==="
          docker system df 2>&1

          echo ""
          echo "=== 9. Git status (EC2 repo) ==="
          cd /home/ubuntu/TELECOM-TOWER-POWER 2>/dev/null && git log --oneline -3 && git status -s

          echo ""
          echo "=== 10. Firewall (ufw) ==="
          sudo ufw status 2>&1 || echo "ufw not available"

          echo ""
          echo "=== 11. Listening ports (9090, 3001, 80, 8000, 8001) ==="
          sudo ss -tulnp | grep -E '9090|3001|:80|8000|8001' 2>&1

          echo ""
          echo "=== 12. Local curl tests ==="
          echo "--- API localhost:8000/health ---"
          curl -sS --max-time 3 http://localhost:8000/health 2>&1
          echo ""
          echo "--- Prometheus localhost:9090 ---"
          curl -sI --max-time 3 http://localhost:9090/ 2>&1 | head -3
          echo "--- Grafana localhost:3001 ---"
          curl -sI --max-time 3 http://localhost:3001/ 2>&1 | head -3
          echo "--- Caddy localhost:80 ---"
          curl -sI --max-time 3 http://localhost:80/ 2>&1 | head -3

          echo ""
          echo "=== 13. docker-compose services ==="
          cd /home/ubuntu/TELECOM-TOWER-POWER 2>/dev/null && docker compose ps 2>&1 || echo "docker-compose not found"

          echo ""
          echo "======== DIAGNOSTICS COMPLETE ========"
          DIAG

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ec2_key /tmp/ec2_key.pub
