name: Update EC2 Alerting Secrets

# Push Slack webhook + SES SMTP credentials to the EC2 host via SSM and
# restart Grafana so contact points are hydrated. Manual trigger only.
#
# Required GitHub Actions secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY   — creds with SSM:SendCommand on the instance
#   EC2_INSTANCE_ID                            — e.g. i-0123456789abcdef0
#   SLACK_WEBHOOK_URL                          — https://hooks.slack.com/services/...
#   SES_SMTP_USERNAME                          — AWS SES SMTP user
#   SES_SMTP_PASSWORD                          — AWS SES SMTP password

on:
  workflow_dispatch:

concurrency:
  group: update-ec2-alerting-secrets
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-alerting-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Validate required GitHub secrets
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SES_SMTP_USERNAME: ${{ secrets.SES_SMTP_USERNAME }}
          SES_SMTP_PASSWORD: ${{ secrets.SES_SMTP_PASSWORD }}
        run: |
          set -euo pipefail
          for name in SLACK_WEBHOOK_URL SES_SMTP_USERNAME SES_SMTP_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub Actions secret: ${name}"
              exit 1
            fi
          done

      - name: Verify EC2 is managed by SSM
        run: |
          set -euo pipefail
          PING_STATUS=$(aws ssm describe-instance-information \
            --region sa-east-1 \
            --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text 2>/dev/null || true)

          echo "SSM PingStatus: ${PING_STATUS}"

          if [ -z "$PING_STATUS" ] || [ "$PING_STATUS" = "None" ] || [ "$PING_STATUS" = "null" ]; then
            echo "::error::Instance not found in SSM."
            exit 1
          fi

          if [ "$PING_STATUS" != "Online" ]; then
            echo "::error::EC2 instance is not Online in SSM. Current status: ${PING_STATUS}"
            exit 1
          fi

      - name: Write alerting secrets on EC2 via SSM
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SES_SMTP_USERNAME: ${{ secrets.SES_SMTP_USERNAME }}
          SES_SMTP_PASSWORD: ${{ secrets.SES_SMTP_PASSWORD }}
        run: |
          SLACK_WEBHOOK_URL_B64=$(printf '%s' "$SLACK_WEBHOOK_URL" | base64 -w 0)
          SES_SMTP_USERNAME_B64=$(printf '%s' "$SES_SMTP_USERNAME" | base64 -w 0)
          SES_SMTP_PASSWORD_B64=$(printf '%s' "$SES_SMTP_PASSWORD" | base64 -w 0)

          cat > /tmp/alerting-ssm-commands.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "if [ -d /home/ubuntu/TELECOM-TOWER-POWER ]; then REPO_DIR=/home/ubuntu/TELECOM-TOWER-POWER; elif [ -d /home/ec2-user/TELECOM-TOWER-POWER ]; then REPO_DIR=/home/ec2-user/TELECOM-TOWER-POWER; else echo 'Repo directory not found'; exit 1; fi",
              "cd \$REPO_DIR",
              "mkdir -p secrets",
              "umask 077",
              "printf '%s' '${SLACK_WEBHOOK_URL_B64}' | base64 -d > secrets/slack_webhook_url",
              "printf '%s' '${SES_SMTP_USERNAME_B64}' | base64 -d > secrets/ses_smtp_username",
              "printf '%s' '${SES_SMTP_PASSWORD_B64}' | base64 -d > secrets/ses_smtp_password",
              "chmod 644 secrets/slack_webhook_url secrets/ses_smtp_username secrets/ses_smtp_password",
              "for file in slack_webhook_url ses_smtp_username ses_smtp_password; do [ -s secrets/\$file ] || { echo missing:\$file; exit 1; }; done",
              "docker compose up -d --no-deps --force-recreate grafana",
              "for i in $(seq 1 30); do if curl -fsS http://localhost:3001/api/health >/dev/null 2>&1; then echo 'Grafana healthy'; break; fi; sleep 2; done",
              "curl -fsS http://localhost:3001/api/health >/dev/null",
              "echo 'Alerting secrets updated and Grafana restarted successfully'"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --region sa-east-1 \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Update alerting secrets (Slack + SES)" \
            --parameters file:///tmp/alerting-ssm-commands.json \
            --query 'Command.CommandId' \
            --output text)

          for _ in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --region sa-east-1 \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' \
              --output text)

            case "$STATUS" in
              Success)
                aws ssm get-command-invocation \
                  --region sa-east-1 \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query 'StandardOutputContent' \
                  --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                aws ssm get-command-invocation \
                  --region sa-east-1 \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query '{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' \
                  --output json
                exit 1
                ;;
            esac

            sleep 5
          done

          echo "::error::Timed out waiting for SSM command ${COMMAND_ID}"
          aws ssm get-command-invocation \
            --region sa-east-1 \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query '{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' \
            --output json || true
          exit 1
