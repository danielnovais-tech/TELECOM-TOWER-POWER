name: Deploy to EC2 (Caddy + Docker stack)

# Sequential deploy of the EC2 host:
#   1. caddy   — SCP + validate + reload Caddy   (always first)
#   2. docker  — git pull + rebuild + restart    (only after caddy succeeds)
#
# Both legacy workflows (deploy-caddy.yml, deploy-ec2-docker.yml) used to
# run in parallel under separate concurrency groups, which produced a
# race: deploy-caddy SCP'd Caddyfile into the repo dir, deploy-ec2-docker
# then refused to `git pull` because of "local changes". This workflow
# replaces both — the caddy job now SCPs directly to /tmp and never
# touches the working tree, and the docker job runs `git pull --rebase
# --autostash` as belt-and-braces. Concurrency group covers both jobs.

on:
  push:
    branches: [main]
    paths:
      # Application code / config that requires a Docker rebuild + restart
      - 'telecom_tower_power_api.py'
      - 'telecom_tower_power.py'
      - 'telecom_tower_power_db.py'
      - 'batch_worker.py'
      - 'worker.py'
      - 'sqs_lambda_worker.py'
      - 'coverage_predict.py'
      - 'coverage_model.npz'
      - 'observation_store.py'
      - 'pdf_generator.py'
      - 'srtm_elevation.py'
      - 'stripe_billing.py'
      - 'stripe_webhook_service.py'
      - 'models.py'
      - 'job_store.py'
      - 'tower_db.py'
      - 's3_storage.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'entrypoint.sh'
      - 'start.sh'
      - 'load_secrets.sh'
      - 'frontend/**'
      - 'prometheus/**'
      - 'grafana/**'
      - 'alertmanager/**'
      - 'redis-metrics-collector/**'
      # Reverse-proxy config — caddy job runs always, docker job is
      # skipped when only Caddyfile changed (see `needs.caddy.outputs`).
      - 'Caddyfile'
      # The workflow file itself, so edits ship via the same path.
      - '.github/workflows/deploy-ec2.yml'
  workflow_dispatch:
    inputs:
      skip_docker:
        description: 'Reload Caddy only, skip the Docker rebuild'
        required: false
        type: boolean
        default: false

concurrency:
  # Single group → one EC2 deploy at a time across both jobs.
  group: deploy-ec2
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  caddy:
    name: Reload Caddy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read
    outputs:
      runner_ip: ${{ steps.sg.outputs.runner_ip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Whitelist runner IP in EC2 SG
        id: sg
        env:
          EC2_SG_ID: ${{ secrets.EC2_SG_ID }}
        run: |
          : "${EC2_SG_ID:?EC2_SG_ID secret not set}"
          RUNNER_IP=$(curl -sSf https://checkip.amazonaws.com | tr -d '\r\n')
          echo "Runner IP: ${RUNNER_IP}"
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id "${EC2_SG_ID}" \
            --protocol tcp --port 22 \
            --cidr "${RUNNER_IP}/32" \
            2>&1 | grep -v "InvalidPermission.Duplicate" || true

      - name: Push SSH key via EC2 Instance Connect
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/ec2_key -N "" -q
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --instance-os-user ubuntu \
            --ssh-public-key file:///tmp/ec2_key.pub

      - name: SCP Caddyfile to /tmp and reload Caddy
        run: |
          # Important: SCP into /tmp, NOT into the repo working tree.
          # The docker job's `git pull` would otherwise see a dirty
          # working tree and abort (this was the historical race).
          LOCAL_MD5=$(md5sum Caddyfile | awk '{print $1}')
          echo "Local Caddyfile md5: $LOCAL_MD5"
          REMOTE_TMP="/tmp/Caddyfile.${GITHUB_RUN_ID}"
          scp -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            Caddyfile \
            "ubuntu@${{ secrets.EC2_HOST }}:${REMOTE_TMP}"
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            "sudo cp '${REMOTE_TMP}' /etc/caddy/Caddyfile && \
             sudo caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile && \
             sudo systemctl reload caddy && \
             rm -f '${REMOTE_TMP}'"
          REMOTE_MD5=$(ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            "sudo md5sum /etc/caddy/Caddyfile | awk '{print \$1}'")
          echo "Remote /etc/caddy/Caddyfile md5: $REMOTE_MD5"
          if [ "$LOCAL_MD5" != "$REMOTE_MD5" ]; then
            echo "::error::Caddyfile md5 mismatch (local=$LOCAL_MD5 remote=$REMOTE_MD5)"
            exit 1
          fi
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            'systemctl is-active caddy'

      - name: Verify Caddy-routed health endpoints
        run: |
          sleep 3
          for HOST in www.telecomtowerpower.com.br app.telecomtowerpower.com.br api.telecomtowerpower.com.br; do
            STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" "https://${HOST}/health")
            echo "Health ${HOST}/health: HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "::error::Health check failed for ${HOST} (HTTP $STATUS)"
              exit 1
            fi
          done
          STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" "https://docs.telecomtowerpower.com.br/")
          echo "Health docs.*/: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Docs site health check failed (HTTP $STATUS)"
            exit 1
          fi

      - name: Revoke runner IP from EC2 SG
        if: always() && steps.sg.outputs.runner_ip != ''
        env:
          EC2_SG_ID: ${{ secrets.EC2_SG_ID }}
          RUNNER_IP: ${{ steps.sg.outputs.runner_ip }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${EC2_SG_ID}" \
            --protocol tcp --port 22 \
            --cidr "${RUNNER_IP}/32" 2>&1 || true

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ec2_key /tmp/ec2_key.pub

  docker:
    name: Rebuild Docker stack
    needs: caddy
    if: ${{ github.event.inputs.skip_docker != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Whitelist runner IP in EC2 SG
        id: sg
        env:
          EC2_SG_ID: ${{ secrets.EC2_SG_ID }}
        run: |
          : "${EC2_SG_ID:?EC2_SG_ID secret not set}"
          RUNNER_IP=$(curl -sSf https://checkip.amazonaws.com | tr -d '\r\n')
          echo "Runner IP: ${RUNNER_IP}"
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id "${EC2_SG_ID}" \
            --protocol tcp --port 22 \
            --cidr "${RUNNER_IP}/32" \
            --tag-specifications "ResourceType=security-group-rule,Tags=[{Key=Name,Value=gh-actions-ephemeral},{Key=Workflow,Value=deploy-ec2}]" \
            2>&1 | grep -v "InvalidPermission.Duplicate" || true

      - name: Push SSH key via EC2 Instance Connect
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/ec2_key -N "" -q
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --instance-os-user ubuntu \
            --ssh-public-key file:///tmp/ec2_key.pub

      - name: Deploy on EC2
        run: |
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            "export GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' && bash -s" << 'DEPLOY'
          set -euo pipefail
          cd /home/ubuntu/TELECOM-TOWER-POWER

          echo "==> Pulling latest code..."
          PREV_SHA=$(git rev-parse HEAD)
          echo "==> Previous commit: $PREV_SHA"
          git config credential.helper '!f() { echo username=x-access-token; echo "password=${GITHUB_TOKEN}"; }; f'
          # --rebase --autostash is the belt-and-braces against any local
          # working-tree drift (Caddy job no longer writes here, but the
          # operator may have edited files manually for hot-fixes).
          git pull --rebase --autostash origin main
          git config --unset credential.helper
          NEW_SHA=$(git rev-parse HEAD)
          echo "==> New commit:      $NEW_SHA"

          echo "==> Pulling latest Docker base images..."
          docker compose pull --quiet postgres redis 2>/dev/null || true
          docker pull python:3.13-slim   2>/dev/null || true
          docker pull node:22-alpine     2>/dev/null || true

          echo "==> Rebuilding Docker images..."
          export COMPOSE_BAKE=false DOCKER_BUILDKIT=1
          docker compose build api
          docker compose build frontend worker rq-worker stripe-webhook 2>/dev/null || true
          docker compose build frontend-react 2>/dev/null || true

          echo "==> Rolling restart (all application containers)..."
          docker compose up -d --no-deps redis           2>/dev/null || true
          docker compose up -d --no-deps postgres        2>/dev/null || true
          docker compose up -d --no-deps api
          docker compose up -d --no-deps worker          2>/dev/null || true
          docker compose up -d --no-deps rq-worker       2>/dev/null || true
          docker compose up -d --no-deps stripe-webhook  2>/dev/null || true
          docker compose up -d --no-deps frontend        2>/dev/null || true
          docker compose up -d --no-deps frontend-react  2>/dev/null || true

          echo "==> Ensuring Grafana-readable secret perms (UID 472)..."
          # Grafana entrypoint runs as non-root and reads these via /run/secrets.
          # If the files are 0600 (default after restore), Grafana fails to start
          # with "Permission denied" → monitoring.* returns 502.
          for f in grafana_admin_password ses_smtp_username ses_smtp_password slack_webhook_url; do
            if [ -f "secrets/$f" ]; then
              chmod a+r "secrets/$f" || true
            fi
          done
          chmod a+rx secrets || true

          echo "==> Rebuilding and restarting monitoring stack..."
          docker compose build grafana prometheus 2>/dev/null || true
          docker compose up -d --no-deps --force-recreate grafana          2>/dev/null || true
          docker compose up -d --no-deps --force-recreate prometheus       2>/dev/null || true
          docker compose up -d --no-deps                 alertmanager      2>/dev/null || true
          docker compose up -d --no-deps                 blackbox-exporter 2>/dev/null || true

          echo "==> Pruning unused Docker images and build cache..."
          docker image prune -af --filter "until=24h" 2>/dev/null || true
          docker builder prune -af --filter "until=24h" 2>/dev/null || true

          echo "==> Disk space report..."
          echo "--- Filesystem ---"
          df -h / | tail -1 | awk '{printf "  Used: %s / %s (%s)\n", $3, $2, $5}'
          echo "--- Docker ---"
          docker system df
          DISK_PCT=$(df / | tail -1 | awk '{print int($5)}')
          if [ "$DISK_PCT" -ge 90 ]; then
            echo "::error::Disk usage critical: ${DISK_PCT}%"
          elif [ "$DISK_PCT" -ge 80 ]; then
            echo "::warning::Disk usage high: ${DISK_PCT}%"
          else
            echo "Disk usage OK: ${DISK_PCT}%"
          fi

          echo "==> Waiting for health check..."
          sleep 10
          STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "API health check: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::API health check failed (HTTP $STATUS) — attempting auto-rollback to $PREV_SHA"
            docker compose logs --tail=50 api || true
            if [ -n "$PREV_SHA" ] && [ "$PREV_SHA" != "$NEW_SHA" ]; then
              echo "==> Rolling back: git reset --hard $PREV_SHA"
              git reset --hard "$PREV_SHA"
              echo "==> Rebuilding api at previous commit..."
              docker compose build api
              docker compose up -d --no-deps api
              sleep 10
              ROLLBACK_STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" http://localhost:8000/health)
              echo "Rollback health check: HTTP $ROLLBACK_STATUS"
              if [ "$ROLLBACK_STATUS" = "200" ]; then
                echo "::warning::Auto-rollback to $PREV_SHA succeeded. New commit $NEW_SHA was reverted."
              else
                echo "::error::Auto-rollback also failed (HTTP $ROLLBACK_STATUS). Manual intervention required."
              fi
            else
              echo "::error::No previous SHA available for rollback (PREV_SHA=$PREV_SHA NEW_SHA=$NEW_SHA)."
            fi
            exit 1
          fi
          echo "==> Deploy complete"
          DEPLOY

      - name: Verify external endpoints
        run: |
          sleep 5
          for HOST in api.telecomtowerpower.com.br app.telecomtowerpower.com.br; do
            STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" "https://${HOST}/health")
            echo "Health check ${HOST}/health: HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "::warning::Health check failed for ${HOST} with HTTP $STATUS"
            fi
          done

      - name: Revoke runner IP from EC2 SG
        if: always() && steps.sg.outputs.runner_ip != ''
        env:
          EC2_SG_ID: ${{ secrets.EC2_SG_ID }}
          RUNNER_IP: ${{ steps.sg.outputs.runner_ip }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${EC2_SG_ID}" \
            --protocol tcp --port 22 \
            --cidr "${RUNNER_IP}/32" 2>&1 || true

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ec2_key /tmp/ec2_key.pub
