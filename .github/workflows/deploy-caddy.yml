name: Deploy Caddyfile to EC2

on:
  push:
    branches: [main]
    paths: [Caddyfile]
  workflow_dispatch:

concurrency:
  group: deploy-caddy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Whitelist runner IP in EC2 SG
        id: sg
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp --port 22 \
            --cidr "${RUNNER_IP}/32" || echo "Rule may already exist"

      - name: Push SSH key via EC2 Instance Connect
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/ec2_key -N "" -q
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --instance-os-user ubuntu \
            --ssh-public-key file:///tmp/ec2_key.pub

      - name: Deploy Caddyfile and reload Caddy on EC2
        run: |
          LOCAL_MD5=$(md5sum Caddyfile | awk '{print $1}')
          echo "Local Caddyfile md5: $LOCAL_MD5"
          scp -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            Caddyfile \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/TELECOM-TOWER-POWER/Caddyfile
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            "sudo cp /home/ubuntu/TELECOM-TOWER-POWER/Caddyfile /etc/caddy/Caddyfile && sudo caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile && sudo systemctl reload caddy"
          # Post-reload integrity check: remote /etc/caddy/Caddyfile must match local
          REMOTE_MD5=$(ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            "sudo md5sum /etc/caddy/Caddyfile | awk '{print \$1}'")
          echo "Remote /etc/caddy/Caddyfile md5: $REMOTE_MD5"
          if [ "$LOCAL_MD5" != "$REMOTE_MD5" ]; then
            echo "::error::Caddyfile md5 mismatch after deploy (local=$LOCAL_MD5 remote=$REMOTE_MD5)"
            exit 1
          fi
          # Confirm caddy is running after reload
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            'systemctl is-active caddy'

      - name: Verify health endpoints
        run: |
          sleep 3
          # Caddy-routed subdomains (expect 200 on /health)
          for HOST in www.telecomtowerpower.com.br app.telecomtowerpower.com.br api.telecomtowerpower.com.br; do
            STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" "https://${HOST}/health")
            echo "Health check ${HOST}/health returned HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "::error::Health check failed for ${HOST} with HTTP $STATUS"
              exit 1
            fi
          done
          # Docs subdomain (static MkDocs site — check root returns 200)
          STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" "https://docs.telecomtowerpower.com.br/")
          echo "Health check docs.*/ returned HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Docs site health check failed with HTTP $STATUS"
            exit 1
          fi
          # ALB direct target groups (bypass Caddy)
          STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" "https://monitoring.telecomtowerpower.com.br/api/health")
          echo "Health check monitoring.*/api/health returned HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Grafana health check returned HTTP $STATUS (may need login)"
          fi
          STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" "https://prometheus.telecomtowerpower.com.br/-/healthy")
          echo "Health check prometheus.*/-/healthy returned HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Prometheus health check returned HTTP $STATUS"
          fi

      - name: Revoke runner IP from EC2 SG
        if: always() && steps.sg.outputs.runner_ip != ''
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID }} \
            --protocol tcp --port 22 \
            --cidr "${{ steps.sg.outputs.runner_ip }}/32" || true

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ec2_key /tmp/ec2_key.pub
