name: Deploy Caddyfile to EC2

on:
  push:
    branches: [main]
    paths: [Caddyfile]
  workflow_dispatch:

concurrency:
  group: deploy-caddy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Push SSH key via EC2 Instance Connect
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/ec2_key -N "" -q
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --instance-os-user ubuntu \
            --ssh-public-key file:///tmp/ec2_key.pub

      - name: Deploy Caddyfile and reload Caddy on EC2
        run: |
          scp -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            Caddyfile \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/TELECOM-TOWER-POWER/Caddyfile
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ubuntu@${{ secrets.EC2_HOST }} \
            'cd /home/ubuntu/TELECOM-TOWER-POWER && sudo caddy reload --config Caddyfile'

      - name: Verify health endpoint
        run: |
          sleep 3
          for HOST in www.telecomtowerpower.com.br app.telecomtowerpower.com.br api.telecomtowerpower.com.br; do
            STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" "https://${HOST}/health")
            echo "Health check ${HOST} returned HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "::error::Health check failed for ${HOST} with HTTP $STATUS"
              exit 1
            fi
          done

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ec2_key /tmp/ec2_key.pub
