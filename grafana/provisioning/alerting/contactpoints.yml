apiVersion: 1

# Configure contact points for Grafana unified alerting.
# Grafana supports $__env{VAR} syntax for environment variable interpolation.
# See https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/

contactPoints:
  # ── Email ─────────────────────────────────────────────────
  - orgId: 1
    name: email-alerts
    receivers:
      - uid: email-1
        type: email
        settings:
          addresses: $__env{ALERT_EMAIL_TO}
          singleEmail: false
        disableResolveMessage: false

  # ── Slack ─────────────────────────────────────────────────
  # Requires SLACK_WEBHOOK_URL (already provisioned via Docker secret).
  # Optional: SLACK_CHANNEL (e.g. "#alerts"). Overrides channel of the webhook.
  - orgId: 1
    name: slack-alerts
    receivers:
      - uid: slack-1
        type: slack
        settings:
          url: $__env{SLACK_WEBHOOK_URL}
          recipient: $__env{SLACK_CHANNEL}
          username: Grafana
          title: |
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
          text: |
            {{ range .Alerts -}}
            *Severity:* {{ .Labels.severity }}
            *Summary:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Started:* {{ .StartsAt }}
            {{ end }}
        disableResolveMessage: false

  # ── PagerDuty ─────────────────────────────────────────────
  # To enable: set PAGERDUTY_INTEGRATION_KEY in .env, then uncomment below.
  # - orgId: 1
  #   name: pagerduty-alerts
  #   receivers:
  #     - uid: pagerduty-1
  #       type: pagerduty
  #       settings:
  #         integrationKey: $__env{PAGERDUTY_INTEGRATION_KEY}
  #         severity: critical
  #       disableResolveMessage: false
