apiVersion: 1

# Configure contact points for Grafana unified alerting.
# Grafana supports $__env{VAR} syntax for environment variable interpolation.
# See https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/

contactPoints:
  # ── Email ─────────────────────────────────────────────────
  - orgId: 1
    name: email-alerts
    receivers:
      - uid: email-1
        type: email
        settings:
          addresses: "daniel.novais@sempreceub.com"
        disableResolveMessage: false

  # ── Slack ─────────────────────────────────────────────────
  # To enable: set SLACK_WEBHOOK_URL in .env, then uncomment below.
  # - orgId: 1
  #   name: slack-alerts
  #   receivers:
  #     - uid: slack-1
  #       type: slack
  #       settings:
  #         url: $__env{SLACK_WEBHOOK_URL}
  #         recipient: "#alerts"
  #       disableResolveMessage: false

  # ── PagerDuty ─────────────────────────────────────────────
  # To enable: set PAGERDUTY_INTEGRATION_KEY in .env, then uncomment below.
  # - orgId: 1
  #   name: pagerduty-alerts
  #   receivers:
  #     - uid: pagerduty-1
  #       type: pagerduty
  #       settings:
  #         integrationKey: $__env{PAGERDUTY_INTEGRATION_KEY}
  #         severity: critical
  #       disableResolveMessage: false
