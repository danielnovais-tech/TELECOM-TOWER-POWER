apiVersion: 1

policies:
  - orgId: 1
    receiver: email-alerts
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: email-alerts
        matchers:
          - severity = critical
        repeat_interval: 1h
        continue: false
      - receiver: email-alerts
        matchers:
          - severity = warning
        repeat_interval: 2h
        continue: false
