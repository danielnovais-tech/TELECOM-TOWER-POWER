apiVersion: 1

# Default fallback = email-alerts. Severity-matched routes fan out to Slack
# AND email via `continue: true` so both channels are notified.
policies:
  - orgId: 1
    receiver: email-alerts
    group_by:
      - grafana_folder
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # ── Critical: notify every 1h on Slack + Email ────────
      - receiver: slack-alerts
        matchers:
          - severity = critical
        group_wait: 15s
        group_interval: 2m
        repeat_interval: 1h
        continue: true
      - receiver: email-alerts
        matchers:
          - severity = critical
        group_wait: 15s
        group_interval: 2m
        repeat_interval: 1h
        continue: false

      # ── Warning: notify every 2h on Slack + Email ─────────
      - receiver: slack-alerts
        matchers:
          - severity = warning
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 2h
        continue: true
      - receiver: email-alerts
        matchers:
          - severity = warning
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 2h
        continue: false
