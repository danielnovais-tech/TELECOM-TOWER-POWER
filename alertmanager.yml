global:
  resolve_timeout: 5m
  # ── SMTP (Amazon SES) ──────────────────────────────────────
  # Credentials injected via envsubst from .env at container start.
  smtp_smarthost: "${SMTP_HOST}"
  smtp_from: "${SMTP_FROM}"
  smtp_auth_username: "${SES_SMTP_USERNAME}"
  smtp_auth_password: "${SES_SMTP_PASSWORD}"
  smtp_require_tls: true

  # ── Slack ─────────────────────────────────────────────────
  slack_api_url: "${SLACK_WEBHOOK_URL}"

  # ── PagerDuty ─────────────────────────────────────────────
  # pagerduty_url: "https://events.pagerduty.com/v2/enqueue"

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    # Critical alerts → PagerDuty + Slack + Email
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 1h

    # Warning alerts → Slack only
    - match:
        severity: warning
      receiver: warning
      repeat_interval: 2h

receivers:
  - name: default
    slack_configs:
      - channel: "#alerts"
        send_resolved: true

  - name: critical
    # ── Slack ───────────────────────────────────────────────
    slack_configs:
      - channel: "#alerts-critical"
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
    # ── Email ───────────────────────────────────────────────
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        send_resolved: true

  - name: warning
    slack_configs:
      - channel: "#alerts-warning"
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
