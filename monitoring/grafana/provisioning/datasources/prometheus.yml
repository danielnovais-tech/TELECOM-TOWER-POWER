apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    # Railway internal DNS — resolves within the same Railway project only.
    # The `prometheus` hostname assumes you name the Prometheus Railway
    # service exactly "prometheus" (lowercase). Change the hostname if you
    # use a different service name.
    url: http://prometheus.railway.internal:9090
    isDefault: true
    editable: true
