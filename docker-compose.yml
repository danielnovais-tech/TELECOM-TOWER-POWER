services:
  # ── Database ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: telecom
      POSTGRES_PASSWORD: telecom_secret
      POSTGRES_DB: towers
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telecom"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (for RQ job queue) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Database Migrations (one-shot — legacy, API now runs alembic on start)
  # migrate:
  #   build: .
  #   command: alembic upgrade head
  #   environment:
  #     - DATABASE_URL=postgresql://telecom:telecom_secret@postgres:5432/towers
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: "no"

  # ── API Server (async DB-backed) ────────────────────────────
  api:
    build: .
    command: sh -c "alembic upgrade head && uvicorn telecom_tower_power_db:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://telecom:telecom_secret@postgres:5432/towers}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8501,http://localhost:3000}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO:-}
      - STRIPE_PRICE_ENTERPRISE=${STRIPE_PRICE_ENTERPRISE:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8501}
      - VALID_API_KEYS=${VALID_API_KEYS:-}
      - ENABLE_DEMO_KEYS=${ENABLE_DEMO_KEYS:-true}
    volumes:
      - ./srtm_data:/app/srtm_data:ro
      - ./key_store.json:/app/key_store.json
      - job_results:/app/job_results
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Background Worker (DB-polling) ──────────────────────────
  worker:
    build: .
    command: python batch_worker.py --poll-interval 2
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://telecom:telecom_secret@postgres:5432/towers}
      - SRTM_REDIS_URL=${SRTM_REDIS_URL:-redis://redis:6379/1}
      - PDF_WORKERS=${PDF_WORKERS:-4}
    volumes:
      - ./srtm_data:/app/srtm_data:ro
      - job_results:/app/job_results
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Stripe Webhook Service (isolated) ──────────────────────
  stripe-webhook:
    build: .
    command: uvicorn stripe_webhook_service:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - WEBHOOK_PORT=8001
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - KEY_STORE_PATH=/app/key_store.json
      - DATABASE_URL=${DATABASE_URL:-postgresql://telecom:telecom_secret@postgres:5432/towers}
    volumes:
      - ./key_store.json:/app/key_store.json
      - ./srtm_data:/app/srtm_data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── RQ Worker (Redis-backed, for telecom_tower_power_db.py) ─
  rq-worker:
    build: .
    command: python worker.py
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://telecom:telecom_secret@postgres:5432/towers}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./srtm_data:/app/srtm_data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Streamlit Frontend ──────────────────────────────────────
  frontend:
    build: .
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── React PWA Frontend ─────────────────────────────────────
  frontend-react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Tower Loader (one-shot) ─────────────────────────────────
  load-towers:
    build: .
    command: python migrate_csv_to_db.py --csv towers_brazil.csv --clear
    environment:
      - DATABASE_URL=postgresql://telecom:telecom_secret@postgres:5432/towers
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana_dashboard.json:/var/lib/grafana/dashboards/telecom.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  job_results:
  prometheus_data:
  grafana_data:
