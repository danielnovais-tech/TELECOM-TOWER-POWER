services:
  # ── Database ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: telecom
      POSTGRES_PASSWORD: telecom_secret
      POSTGRES_DB: towers
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telecom"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Database Migrations (one-shot) ───────────────────────────
  migrate:
    build: .
    command: alembic upgrade head
    environment:
      - DATABASE_URL=postgresql://telecom:telecom_secret@postgres:5432/towers
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── API Server ──────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://telecom:telecom_secret@postgres:5432/towers
      - CORS_ORIGINS=http://localhost:8501,http://localhost:3000
    volumes:
      - ./srtm_data:/app/srtm_data:ro
      - ./key_store.json:/app/key_store.json
      - job_results:/app/job_results
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Background Worker ───────────────────────────────────────
  worker:
    build: .
    command: python batch_worker.py --poll-interval 2
    environment:
      - DATABASE_URL=postgresql://telecom:telecom_secret@postgres:5432/towers
    volumes:
      - ./srtm_data:/app/srtm_data:ro
      - job_results:/app/job_results
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Streamlit Frontend ──────────────────────────────────────
  frontend:
    build: .
    command: streamlit run frontend.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Tower Loader (one-shot) ─────────────────────────────────
  load-towers:
    build: .
    command: python migrate_csv_to_db.py --csv towers_brazil.csv --clear
    environment:
      - DATABASE_URL=postgresql://telecom:telecom_secret@postgres:5432/towers
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana_dashboard.json:/var/lib/grafana/dashboards/telecom.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  job_results:
  prometheus_data:
  grafana_data:
