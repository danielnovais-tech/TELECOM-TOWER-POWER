services:
  # ── Database ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: telecom
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: towers
    secrets:
      - postgres_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telecom"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (for RQ job queue + SRTM elevation cache) ───────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Database Migrations (one-shot — legacy, API now runs alembic on start)
  # migrate:
  #   build: .
  #   command: alembic upgrade head
  #   environment:
  #     - DATABASE_URL=postgresql://telecom:telecom_secret@postgres:5432/towers
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: "no"

  # ── API Server (full-featured, production) ───────────────────
  api:
    build: .
    command: sh -c ". /app/load_secrets.sh && alembic upgrade head && exec uvicorn telecom_tower_power_api:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SRTM_REDIS_URL=${SRTM_REDIS_URL:-redis://redis:6379/1}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000,http://localhost:8501}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - ENABLE_DEMO_KEYS=${ENABLE_DEMO_KEYS:-true}
    secrets:
      - database_url
      - aws_access_key_id
      - aws_secret_access_key
      - stripe_secret_key
      - stripe_webhook_secret
      - stripe_price_pro
      - stripe_price_enterprise
      - valid_api_keys
      - slack_webhook_url
    volumes:
      - ./srtm_data:/app/srtm_data:ro
      - ./key_store.json:/app/key_store.json
      - job_results:/app/job_results
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Background Worker (DB-polling) ──────────────────────────
  worker:
    build: .
    command: sh -c ". /app/load_secrets.sh && exec python batch_worker.py --poll-interval 2"
    environment:
      - SRTM_REDIS_URL=${SRTM_REDIS_URL:-redis://redis:6379/1}
      - PDF_WORKERS=${PDF_WORKERS:-4}
    secrets:
      - database_url
    volumes:
      - ./srtm_data:/app/srtm_data:ro
      - job_results:/app/job_results
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Stripe Webhook Service (isolated) ──────────────────────
  stripe-webhook:
    build: .
    command: sh -c ". /app/load_secrets.sh && exec uvicorn stripe_webhook_service:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"
    environment:
      - WEBHOOK_PORT=8001
      - KEY_STORE_PATH=/app/key_store.json
      - SES_SMTP_HOST=${SES_SMTP_HOST:-email-smtp.sa-east-1.amazonaws.com}
      - SES_SMTP_PORT=${SES_SMTP_PORT:-587}
      - SES_FROM_ADDRESS=${SES_FROM_ADDRESS:-no-reply@telecomtowerpower.com.br}
    secrets:
      - database_url
      - stripe_secret_key
      - stripe_webhook_secret
      - ses_smtp_username
      - ses_smtp_password
    volumes:
      - ./key_store.json:/app/key_store.json
      - ./srtm_data:/app/srtm_data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── RQ Worker (Redis-backed, for telecom_tower_power_db.py) ─
  rq-worker:
    build: .
    command: sh -c ". /app/load_secrets.sh && exec python worker.py"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
    secrets:
      - database_url
      - aws_access_key_id
      - aws_secret_access_key
    volumes:
      - ./srtm_data:/app/srtm_data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Streamlit Frontend (hybrid) ──────────────────────────────
  frontend:
    build: .
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Streamlit Frontend (API-client mode) ────────────────────
  frontend-api:
    build: .
    command: streamlit run frontend.py --server.port 8502 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8502:8502"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - api-frontend
    restart: unless-stopped

  # ── React PWA Frontend ─────────────────────────────────────
  frontend-react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Tower Loader (one-shot) ─────────────────────────────────
  load-towers:
    build: .
    command: sh -c ". /app/load_secrets.sh && exec python migrate_csv_to_db.py --csv towers_brazil.csv --clear"
    secrets:
      - database_url
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus Alertmanager ─────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    environment:
      - SMTP_HOST=${SMTP_HOST:-email-smtp.sa-east-1.amazonaws.com:587}
      - SMTP_FROM=${SMTP_FROM:-alerts@telecomtowerpower.com.br}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-daniel.novais@sempreceub.com}
    secrets:
      - ses_smtp_username
      - ses_smtp_password
      - slack_webhook_url
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        SES_SMTP_USERNAME=$(cat /run/secrets/ses_smtp_username 2>/dev/null || echo "")
        SES_SMTP_PASSWORD=$(cat /run/secrets/ses_smtp_password 2>/dev/null || echo "")
        SLACK_WEBHOOK_URL=$(cat /run/secrets/slack_webhook_url 2>/dev/null || echo "https://hooks.slack.com/services/PLACEHOLDER")
        cat > /etc/alertmanager/alertmanager.yml <<ENDCFG
        global:
          resolve_timeout: 5m
          smtp_smarthost: "$$SMTP_HOST"
          smtp_from: "$$SMTP_FROM"
          smtp_auth_username: "$$SES_SMTP_USERNAME"
          smtp_auth_password: "$$SES_SMTP_PASSWORD"
          smtp_require_tls: true
          slack_api_url: "$$SLACK_WEBHOOK_URL"
        route:
          group_by: ["alertname", "severity"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: default
          routes:
            - match:
                severity: critical
              receiver: critical
              repeat_interval: 1h
            - match:
                severity: warning
              receiver: warning
              repeat_interval: 2h
        receivers:
          - name: default
            slack_configs:
              - channel: "#alerts"
                send_resolved: true
          - name: critical
            slack_configs:
              - channel: "#alerts-critical"
                send_resolved: true
                title: '{{ .GroupLabels.alertname }}'
                text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
            email_configs:
              - to: "$$ALERT_EMAIL_TO"
                send_resolved: true
          - name: warning
            slack_configs:
              - channel: "#alerts-warning"
                send_resolved: true
                title: '{{ .GroupLabels.alertname }}'
                text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        inhibit_rules:
          - source_match:
              severity: critical
            target_match:
              severity: warning
            equal: ["alertname"]
        ENDCFG
        exec /bin/alertmanager \
          --config.file=/etc/alertmanager/alertmanager.yml \
          --storage.path=/alertmanager
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST:-email-smtp.sa-east-1.amazonaws.com:587}
      - GF_SMTP_USER__FILE=/run/secrets/ses_smtp_username
      - GF_SMTP_PASSWORD__FILE=/run/secrets/ses_smtp_password
      - GF_SMTP_FROM_ADDRESS=${SMTP_FROM:-alerts@telecomtowerpower.com.br}
    secrets:
      - ses_smtp_username
      - ses_smtp_password
      - slack_webhook_url
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana_dashboard.json:/var/lib/grafana/dashboards/telecom.json:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  job_results:
  prometheus_data:
  grafana_data:

# ── Secrets (file-based, never appear in docker inspect) ──────
secrets:
  database_url:
    file: ./secrets/database_url
  postgres_password:
    file: ./secrets/postgres_password
  aws_access_key_id:
    file: ./secrets/aws_access_key_id
  aws_secret_access_key:
    file: ./secrets/aws_secret_access_key
  stripe_secret_key:
    file: ./secrets/stripe_secret_key
  stripe_webhook_secret:
    file: ./secrets/stripe_webhook_secret
  stripe_price_pro:
    file: ./secrets/stripe_price_pro
  stripe_price_enterprise:
    file: ./secrets/stripe_price_enterprise
  ses_smtp_username:
    file: ./secrets/ses_smtp_username
  ses_smtp_password:
    file: ./secrets/ses_smtp_password
  valid_api_keys:
    file: ./secrets/valid_api_keys
  slack_webhook_url:
    file: ./secrets/slack_webhook_url
