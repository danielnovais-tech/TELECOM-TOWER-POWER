services:
  # ── Database ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: telecom
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: towers
    secrets:
      - postgres_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telecom"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PgBouncer (connection pooling) ─────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      - DATABASE_URL=postgres://telecom:${POSTGRES_PASSWORD:-telecom_secret}@postgres:5432/towers
      - POOL_MODE=transaction
      - DEFAULT_POOL_SIZE=20
      - MAX_CLIENT_CONN=200
      - MIN_POOL_SIZE=5
      - RESERVE_POOL_SIZE=5
      - SERVER_IDLE_TIMEOUT=600
      - SERVER_LIFETIME=3600
      - AUTH_TYPE=scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (for RQ job queue + SRTM elevation cache) ───────────
  redis:
    image: redis:8.2.5-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis Metrics Exporter (for Prometheus) ────────────────
  redis-metrics-collector:
    build: ./redis-metrics-collector
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Database Migrations (one-shot — legacy, API now runs alembic on start)
  # migrate:
  #   build: .
  #   command: alembic upgrade head
  #   environment:
  #     - DATABASE_URL=postgresql://telecom:telecom_secret@postgres:5432/towers
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: "no"

  # ── API Server (full-featured, production) ───────────────────
  api:
    build: .
    command: sh -c ". /app/load_secrets.sh && alembic upgrade head && exec uvicorn telecom_tower_power_api:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SRTM_REDIS_URL=${SRTM_REDIS_URL:-redis://redis:6379/1}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000,http://localhost:8501}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - ENABLE_DEMO_KEYS=${ENABLE_DEMO_KEYS:-false}
    secrets:
      - database_url
      - aws_access_key_id
      - aws_secret_access_key
      - stripe_secret_key
      - stripe_webhook_secret
      - stripe_price_pro
      - stripe_price_enterprise
      - valid_api_keys
      - slack_webhook_url
    volumes:
      - ./srtm_data:/app/srtm_data:ro
      - ./key_store.json:/app/key_store.json
      - job_results:/app/job_results
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Background Worker (DB-polling) ──────────────────────────
  worker:
    build: .
    command: sh -c ". /app/load_secrets.sh && exec python batch_worker.py --poll-interval 2"
    environment:
      - SRTM_REDIS_URL=${SRTM_REDIS_URL:-redis://redis:6379/1}
      - PDF_WORKERS=${PDF_WORKERS:-4}
    secrets:
      - database_url
    volumes:
      - ./srtm_data:/app/srtm_data:ro
      - job_results:/app/job_results
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,pathlib; assert any('batch_worker.py' in pathlib.Path(f'/proc/{p}/cmdline').read_bytes().decode('utf-8','ignore') for p in os.listdir('/proc') if p.isdigit())\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Stripe Webhook Service (isolated) ──────────────────────
  stripe-webhook:
    build: .
    command: sh -c ". /app/load_secrets.sh && exec uvicorn stripe_webhook_service:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"
    environment:
      - WEBHOOK_PORT=8001
      - KEY_STORE_PATH=/app/key_store.json
      - SES_SMTP_HOST=${SES_SMTP_HOST:-email-smtp.us-east-1.amazonaws.com}
      - SES_SMTP_PORT=${SES_SMTP_PORT:-587}
      - SES_FROM_ADDRESS=${SES_FROM_ADDRESS:-no-reply@telecomtowerpower.com.br}
    secrets:
      - database_url
      - stripe_secret_key
      - stripe_webhook_secret
      - ses_smtp_username
      - ses_smtp_password
    volumes:
      - ./key_store.json:/app/key_store.json
      - ./srtm_data:/app/srtm_data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── RQ Worker (Redis-backed, for telecom_tower_power_db.py) ─
  rq-worker:
    build: .
    command: sh -c ". /app/load_secrets.sh && exec python worker.py"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
    secrets:
      - database_url
      - aws_access_key_id
      - aws_secret_access_key
    volumes:
      - ./srtm_data:/app/srtm_data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,pathlib; assert any('worker.py' in pathlib.Path(f'/proc/{p}/cmdline').read_bytes().decode('utf-8','ignore') for p in os.listdir('/proc') if p.isdigit())\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Streamlit Frontend (hybrid) ──────────────────────────────
  frontend:
    build: .
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Streamlit Frontend (API-client mode) ────────────────────
  frontend-api:
    build: .
    command: streamlit run frontend.py --server.port 8502 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8502:8502"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - api-frontend
    restart: unless-stopped

  # ── React PWA Frontend ─────────────────────────────────────
  frontend-react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Tower Loader (one-shot) ─────────────────────────────────
  load-towers:
    build: .
    command: sh -c ". /app/load_secrets.sh && exec python migrate_csv_to_db.py --csv towers_brazil.csv --clear"
    secrets:
      - database_url
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    build: ./prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Blackbox Exporter (synthetic probes for failover viability) ──
  # Probes https://api.telecomtowerpower.com.br/health (real customer URL)
  # and the Railway edge with Host/SNI override to catch SECONDARY-leg drift
  # BEFORE the ALB health check forces a failover. Configured in
  # prometheus/blackbox.yml.
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    command:
      - '--config.file=/etc/blackbox/blackbox.yml'
    volumes:
      - ./prometheus/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    ports:
      - "9115:9115"
    restart: unless-stopped

  # ── Node Exporter (host metrics for infra alerts) ───────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: telecom-tower-power-node-exporter-1
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/lib/docker/.+)($$|/)'
    volumes:
      - /:/host:ro,rslave
    pid: host
    network_mode: host
    restart: unless-stopped

  # ── Prometheus Alertmanager ─────────────────────────────────
  alertmanager:
    build: ./alertmanager
    ports:
      - "9093:9093"
    environment:
      - SMTP_HOST=${SMTP_HOST:-email-smtp.us-east-1.amazonaws.com:587}
      - SMTP_FROM=${SMTP_FROM:-alerts@telecomtowerpower.com.br}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-daniel.novais@sempreceub.com}
    secrets:
      - ses_smtp_username
      - ses_smtp_password
      - slack_webhook_url
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    build: ./grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST:-email-smtp.us-east-1.amazonaws.com:587}
      - GF_SMTP_USER__FILE=/run/secrets/ses_smtp_username
      - GF_SMTP_PASSWORD__FILE=/run/secrets/ses_smtp_password
      - GF_SMTP_FROM_ADDRESS=${SMTP_FROM:-alerts@telecomtowerpower.com.br}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-daniel.novais@sempreceub.com}
      - SLACK_CHANNEL=${SLACK_CHANNEL:-#alerts}
    secrets:
      - grafana_admin_password
      - ses_smtp_username
      - ses_smtp_password
      - slack_webhook_url
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  job_results:
  prometheus_data:
  grafana_data:

# ── Secrets (file-based, never appear in docker inspect) ──────
secrets:
  database_url:
    file: ./secrets/database_url
  postgres_password:
    file: ./secrets/postgres_password
  aws_access_key_id:
    file: ./secrets/aws_access_key_id
  aws_secret_access_key:
    file: ./secrets/aws_secret_access_key
  stripe_secret_key:
    file: ./secrets/stripe_secret_key
  stripe_webhook_secret:
    file: ./secrets/stripe_webhook_secret
  stripe_price_pro:
    file: ./secrets/stripe_price_pro
  stripe_price_enterprise:
    file: ./secrets/stripe_price_enterprise
  ses_smtp_username:
    file: ./secrets/ses_smtp_username
  ses_smtp_password:
    file: ./secrets/ses_smtp_password
  valid_api_keys:
    file: ./secrets/valid_api_keys
  slack_webhook_url:
    file: ./secrets/slack_webhook_url
  grafana_admin_password:
    file: ./secrets/grafana_admin_password
