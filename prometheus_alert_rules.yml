groups:
  - name: telecom_tower_power_alerts
    rules:
      # ── High 5xx Rate ────────────────────────────────────────
      # Fires when the rate of 5xx responses exceeds 10 per minute.
      - alert: High5xxRate
        expr: sum(rate(http_requests_total{status=~"5.."}[1m])) * 60 > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate ({{ $value | printf \"%.1f\" }}/min)"
          description: >
            The API is returning more than 10 server errors per minute.
            Current rate: {{ $value | printf "%.1f" }} errors/min.

      # ── High 429 Rate (Rate-Limit Exceeded) ─────────────────
      # Fires when the rate of rate-limit hits exceeds 5 per minute.
      - alert: High429Rate
        expr: sum(rate(rate_limit_hits_total[1m])) * 60 > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High rate-limit hit rate ({{ $value | printf \"%.1f\" }}/min)"
          description: >
            Clients are being rate-limited more than 5 times per minute.
            Current rate: {{ $value | printf "%.1f" }} hits/min.

      # ── High Latency (p99 > 2s) ─────────────────────────────
      # Fires when p99 request latency exceeds 2 seconds.
      - alert: HighLatency
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency ({{ $value | printf \"%.2f\" }}s)"
          description: >
            The 99th-percentile request latency has exceeded 2 seconds
            for 5 minutes. Current p99: {{ $value | printf "%.2f" }}s.
