groups:
  - name: telecom_tower_power_alerts
    rules:
      # ── High 5xx Rate ────────────────────────────────────────
      # Fires when the rate of 5xx responses exceeds 10 per minute.
      - alert: High5xxRate
        expr: sum(rate(http_requests_total{status=~"5.."}[1m])) * 60 > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate ({{ $value | printf \"%.1f\" }}/min)"
          description: >
            The API is returning more than 10 server errors per minute.
            Current rate: {{ $value | printf "%.1f" }} errors/min.

      # ── High 429 Rate (Rate-Limit Exceeded) ─────────────────
      # Fires when the rate of rate-limit hits exceeds 5 per minute.
      - alert: High429Rate
        expr: sum(rate(rate_limit_hits_total[1m])) * 60 > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High rate-limit hit rate ({{ $value | printf \"%.1f\" }}/min)"
          description: >
            Clients are being rate-limited more than 5 times per minute.
            Current rate: {{ $value | printf "%.1f" }} hits/min.

      # ── High Latency (p99 > 2s) ─────────────────────────────
      # Fires when p99 request latency exceeds 2 seconds.
      - alert: HighLatency
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency ({{ $value | printf \"%.2f\" }}s)"
          description: >
            The 99th-percentile request latency has exceeded 2 seconds
            for 5 minutes. Current p99: {{ $value | printf "%.2f" }}s.

      # ── High Latency p95 > 1s ───────────────────────────────
      # Fires when the 95th-percentile request latency stays above 1 second
      # for 5 minutes. This catches user-visible slowness earlier than the
      # p99 rule above (which only fires on severe tail latency).
      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency ({{ $value | printf \"%.2f\" }}s)"
          description: >
            The 95th-percentile request latency has exceeded 1 second
            for 5 minutes. Current p95: {{ $value | printf "%.2f" }}s.

      # ── Disk Space Low (< 10% free on any non-virtual FS) ───
      # Uses node_exporter metrics. Ignores tmpfs/overlay/container overlays.
      - alert: DiskSpaceLow
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|devtmpfs"}
            /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs|devtmpfs"}
          ) * 100 < 10
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk space low on {{ $labels.instance }}:{{ $labels.mountpoint }} ({{ $value | printf \"%.1f\" }}% free)"
          description: >
            Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }}
            has less than 10% free space for 10 minutes.
            Current: {{ $value | printf "%.1f" }}% free.

      # ── Batch Queue Stuck ───────────────────────────────────
      # Fires when there are queued jobs but nothing is being processed
      # (the oldest queued job has been waiting longer than 10 minutes).
      # Indicates a wedged worker, DB lock, or missing worker replica.
      - alert: BatchQueueStuck
        expr: batch_queue_oldest_age_seconds > 600 and batch_queue_depth{status="queued"} > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Batch queue stuck (oldest job waiting {{ $value | printf \"%.0f\" }}s)"
          description: >
            The oldest queued batch job has been waiting more than 10 minutes.
            Current depth: {{ with query "batch_queue_depth{status='queued'}" }}{{ . | first | value }}{{ end }} jobs,
            oldest age: {{ $value | printf "%.0f" }}s. Check batch_worker / rq-worker processes.

      # ── High Rate-Limit Hits (stronger, sustained) ──────────
      # Complements the short-window High429Rate above. This one fires
      # only when rate-limit rejections are sustained >20/min for 10m,
      # which usually means a legitimate customer hit their plan ceiling
      # and may need an upgrade or quota bump.
      - alert: HighRateLimitHits
        expr: sum(rate(rate_limit_hits_total[5m])) * 60 > 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Sustained rate-limit rejections ({{ $value | printf \"%.1f\" }}/min)"
          description: >
            Rate-limit rejections have exceeded 20/min (5m avg) for 10 minutes.
            Current rate: {{ $value | printf "%.1f" }} hits/min.
            Investigate which tier/key is being throttled
            (see rate_limit_hits_total by tier).

      # ── Batch Job Failures ──────────────────────────────────
      # Fires when any batch job fails (critical for /batch_reports).
      - alert: BatchJobFailures
        expr: sum(increase(batch_jobs_failed_total[5m])) > 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Batch job failures detected ({{ $value | printf \"%.0f\" }} in 5min)"
          description: >
            One or more batch jobs have failed in the last 5 minutes.
            Check worker logs and SQS dead-letter queue.

      # ── Failover SECONDARY leg (Railway) down ────────────────
      # Probes https://i1fuknjg.up.railway.app/health with Host+SNI set
      # to the custom domain. A failure here means failover would itself
      # fail (stale edge, missing TXT, cert mismatch, Railway outage).
      - alert: RailwaySecondaryDown
        expr: probe_success{probe_leg="railway_edge"} == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Railway SECONDARY failover leg is not healthy"
          description: >
            Blackbox probe of the Railway edge for api.telecomtowerpower.com.br
            has been failing for 10m. Route 53 would still fail over to this
            target if the ALB dies — investigate Railway + run
            scripts/verify_failover.sh to pinpoint the cause.

      # ── Failover SECONDARY cert mismatch / TLS failure ───────
      # probe_ssl_earliest_cert_expiry is 0 when TLS handshake failed.
      - alert: RailwaySecondaryCertInvalid
        expr: probe_success{probe_leg="railway_edge"} == 0
              and probe_ssl_earliest_cert_expiry{probe_leg="railway_edge"} == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Railway edge not serving a valid cert for api.telecomtowerpower.com.br"
          description: >
            TLS handshake against the Railway edge with SNI =
            api.telecomtowerpower.com.br failed for 15m. Usually means the
            Railway custom domain lost validation (missing _railway-verify TXT)
            or Railway rotated the edge and RAILWAY_DNS is stale.

      # ── Customer URL down (covers whichever leg is active) ───
      - alert: ApiCustomerUrlDown
        expr: probe_success{probe_leg="customer_url"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "api.telecomtowerpower.com.br is not returning healthy"
          description: >
            End-to-end probe of the public API has been failing for 5m.
            This is what customers see regardless of PRIMARY/SECONDARY state.

      # ── Cert expiring soon (either leg) ──────────────────────
      - alert: ApiTlsCertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) < 14 * 24 * 3600
              and probe_ssl_earliest_cert_expiry > 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS cert for {{ $labels.instance }} expires in < 14 days"
          description: >
            Seconds remaining until expiry: {{ $value | humanizeDuration }}.
            Check ACM (ALB leg) / Railway custom-domain validation (Railway leg).
