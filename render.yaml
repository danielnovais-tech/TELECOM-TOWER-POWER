# Primary infrastructure is now on AWS ECS Fargate (sa-east-1)
# - ALB: telecom-tower-power-alb-581610578.sa-east-1.elb.amazonaws.com
# - RDS: telecom-tower-power-db.c5sqioy2uu2m.sa-east-1.rds.amazonaws.com
# - Redis: telecom-tower-power-redis.ckcuxz.0001.sae1.cache.amazonaws.com
# Render services below can also use Render-managed databases.

databases:
  - name: telecom-tower-power-db
    plan: free
    databaseName: towers
    user: telecom

redis:
  - name: telecom-tower-power-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

services:
  - type: web
    name: telecom-tower-power-api
    runtime: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head && python migrate_csv_to_db.py --csv towers_brazil.csv
    startCommand: uvicorn telecom_tower_power_db:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: DATABASE_URL
        fromDatabase:
          name: telecom-tower-power-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: telecom-tower-power-redis
          property: connectionString
      - key: CORS_ORIGINS
        value: https://telecom-tower-power-ui.onrender.com,https://app.telecomtowerpower.com
      - key: MAX_BATCH_ROWS
        value: "500"
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: VALID_API_KEYS
        sync: false
      - key: FRONTEND_URL
        value: https://telecom-tower-power-ui.onrender.com
    plan: free

  - type: web
    name: telecom-tower-power-react
    runtime: static
    buildCommand: cd frontend && npm ci && npx vite build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /api/*
        destination: https://telecom-tower-power-api.onrender.com/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
    plan: free

  - type: worker
    name: telecom-tower-power-rq-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: rq worker batch_pdfs --url $REDIS_URL
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: DATABASE_URL
        fromDatabase:
          name: telecom-tower-power-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: telecom-tower-power-redis
          property: connectionString
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
    plan: free

  - type: web
    name: telecom-tower-power-ui
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: API_URL
        value: https://telecom-tower-power-api.onrender.com
    plan: free
